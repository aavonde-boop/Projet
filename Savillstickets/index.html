<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketingDesk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA; --surface:#fff; --surface2:#F1F3F8;
  --border:#E4E7EF; --border2:#CDD1E0;
  --text:#1E2A3B; --text2:#3D4D63; --subtle:#637081; --muted:#9AA5B4;
  --brand:#2563EB; --brand-dk:#1D4ED8; --brand-dim:#EFF6FF; --brand-mid:#BFDBFE;
  --green:#059669; --green-dim:#ECFDF5; --green-mid:#A7F3D0;
  --amber:#D97706; --amber-dim:#FFFBEB; --amber-mid:#FDE68A;
  --red:#DC2626;   --red-dim:#FEF2F2;   --red-mid:#FECACA;
  --violet:#7C3AED;--violet-dim:#EDE9FE;--violet-mid:#C4B5FD;
  --r:8px; --rlg:12px;
  --sans:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  --sh0:0 1px 2px rgba(0,0,0,.05);
  --sh1:0 2px 6px rgba(0,0,0,.07);
  --sh2:0 8px 24px rgba(0,0,0,.09);
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
/* HEADER */
header{display:flex;align-items:center;gap:12px;padding:0 24px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--sh0)}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-mark{width:27px;height:27px;border-radius:7px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(37,99,235,.3)}
.logo-text{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)}
.logo-text em{color:var(--brand);font-style:normal}
.hsp{flex:1}
#countdown{display:none;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--brand);background:var(--brand-dim);border:1px solid var(--brand-mid);padding:3px 11px;border-radius:18px;cursor:pointer}
#countdown.urg{color:var(--amber);background:var(--amber-dim);border-color:var(--amber-mid)}
/* BUTTONS */
.btn{border:none;border-radius:var(--r);padding:7px 14px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-brand{background:var(--brand);color:#fff;box-shadow:0 1px 4px rgba(37,99,235,.25)}.btn-brand:hover{background:var(--brand-dk)}
.btn-outline{background:var(--surface);color:var(--text2);border:1.5px solid var(--border2)}.btn-outline:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-dim)}
.btn-red{background:var(--surface);color:var(--red);border:1.5px solid var(--red-mid)}.btn-red:hover{background:var(--red-dim)}
.btn-violet{background:var(--violet);color:#fff}.btn-violet:hover{opacity:.9}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:2px 8px;font-size:11.5px;border-radius:5px}
/* MAIN */
main{padding:26px 32px}
/* SECTION HEADER */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sec-title{font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:9px}
.sec-title p{font-size:12px;color:var(--subtle);font-weight:400;margin-top:2px}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:16px 18px;box-shadow:var(--sh0);display:flex;align-items:center;gap:13px}
.sico{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slbl{font-size:11px;font-weight:500;color:var(--subtle);margin-bottom:2px}
.sval{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1}
.st-amb .sval{color:var(--amber)}.st-grn .sval{color:var(--green)}
.st-amb .sico{background:var(--amber-dim)}.st-grn .sico{background:var(--green-dim)}
/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.srch{display:flex;align-items:center;gap:7px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:6px 12px;flex:1;min-width:180px;box-shadow:var(--sh0);transition:border-color .15s}
.srch:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}
.srch input{background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:13px;width:100%}
.srch input::placeholder{color:var(--muted)}
select{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:var(--sans);font-size:13px;padding:6px 11px;outline:none;cursor:pointer}
select:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh0)}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);text-align:left;padding:9px 13px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
.tbl td{padding:11px 13px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#F5F7FF}
.tt{font-weight:600;color:var(--text);font-size:13px}
.ts{font-size:11.5px;color:var(--subtle);margin-top:2px}
.ta{display:flex;gap:4px;opacity:0;transition:opacity .1s;margin-top:6px;flex-wrap:wrap}
.tbl tr:hover .ta{opacity:1}
.srt{cursor:pointer}.srt:hover{color:var(--brand);background:#EEF2FF}
.sico2{font-size:9px;opacity:.35;margin-left:2px}
.sa .sico2{opacity:1;color:var(--brand)}.sa .sico2::after{content:'↑'}
.sd .sico2{opacity:1;color:var(--brand)}.sd .sico2::after{content:'↓'}
:not(.sa):not(.sd) .sico2::after{content:'↕'}
/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:18px;white-space:nowrap;border:1px solid transparent;cursor:pointer}
.cp{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-mid)}
.cd{background:var(--green-dim);color:var(--green);border-color:var(--green-mid)}
/* STATUS DROPDOWN */
.sdrop{position:relative;display:inline-block}
.sdrop-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh2);z-index:50;min-width:130px;overflow:hidden}
.sdrop-menu.open{display:block}
.sdrop-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text2);transition:background .1s}
.sdrop-opt:hover{background:var(--surface2)}
/* INLINE EDIT */
.edcell{cursor:pointer;border-radius:4px;padding:1px 3px;margin:-1px -3px;transition:background .1s;display:block}
.edcell:hover{background:var(--brand-dim);outline:1px dashed var(--brand-mid)}
.iput{border:1.5px solid var(--brand)!important;border-radius:5px!important;background:var(--surface)!important;color:var(--text)!important;font-family:var(--sans)!important;font-size:13px!important;padding:3px 7px!important;outline:none!important;box-shadow:0 0 0 3px var(--brand-dim)!important;width:100%!important}
.iput-date{font-family:var(--mono)!important;font-size:12px!important}
.itxt{min-height:52px!important;resize:vertical!important}
/* RELANCES */
.rl{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text2);padding:2px 0}
.rl-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rl-cmt{font-size:10.5px;color:var(--muted);margin-left:2px}
/* PENDING BANNER */
.pb{background:var(--amber-dim);border:1px solid var(--amber-mid);border-radius:var(--rlg);padding:12px 16px;margin-bottom:18px}
.pb-ttl{font-weight:700;font-size:12.5px;color:var(--amber);display:flex;align-items:center;gap:6px;margin-bottom:9px}
.pb-it{display:flex;gap:8px;padding:7px 11px;background:rgba(255,255,255,.7);border:1px solid var(--amber-mid);border-radius:var(--r);margin-bottom:5px;font-size:12px}
.pb-it:last-child{margin-bottom:0}
/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty svg{opacity:.25;margin-bottom:10px}
.empty p{font-size:13px;color:var(--subtle)}
/* SECTION DIVIDER */
/* MEETING DETAIL */
#mtgOv{display:none;position:fixed;inset:0;background:rgba(30,42,59,.2);backdrop-filter:blur(2px);z-index:250}
#mtgPanel{position:absolute;right:0;top:0;bottom:0;width:560px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;box-shadow:var(--sh2);overflow:hidden;animation:sli .2s ease}
@keyframes sli{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
#mtgInner{flex:1;overflow-y:auto;padding:22px}
#mtgFoot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:8px;background:var(--surface2);flex-shrink:0}
/* MEETING FORM */
.fmo{display:none;position:fixed;inset:0;background:rgba(30,42,59,.25);backdrop-filter:blur(4px);z-index:300;justify-content:flex-end}
.fmo.open{display:flex}
.fmp{background:var(--surface);width:520px;max-width:95vw;height:100%;display:flex;flex-direction:column;box-shadow:var(--sh2);border-left:1px solid var(--border);overflow:hidden;animation:sli .2s ease}
.fmh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fmh h2{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.fmc{background:none;border:none;cursor:pointer;color:var(--subtle);padding:5px;border-radius:var(--r);display:flex;transition:all .1s}
.fmc:hover{color:var(--red);background:var(--red-dim)}
.fmb{flex:1;overflow-y:auto;padding:18px 20px}
.fmf{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface2)}
.wbar{display:flex;gap:3px;margin-bottom:15px}
.ws{flex:1;height:3px;border-radius:2px;background:var(--border)}
.ws.done{background:var(--green-mid)}.ws.act{background:var(--brand)}
.wlbl{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:8px;font-family:var(--mono)}
.wp{display:none}.wp.active{display:block}
.dndl{display:flex;flex-direction:column;gap:4px}
.dndi{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:7px 10px;cursor:grab;transition:all .12s}
.dndi:hover{border-color:var(--brand-mid);background:var(--brand-dim)}
.dndi.dov{border-color:var(--brand);background:var(--brand-dim)}
.dndi.dr{opacity:.3}
.tfc{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.tfch{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.tfcn{font-size:10px;font-weight:700;background:var(--brand-dim);color:var(--brand);padding:2px 8px;border-radius:9px;border:1px solid var(--brand-mid);font-family:var(--mono)}
.thp{background:var(--amber-dim);border:1px solid var(--amber-mid);border-radius:var(--r);padding:8px 10px;margin-bottom:10px}
.thpl{font-size:9.5px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.thpr{font-size:11px;color:var(--text2);border-left:2px solid var(--amber-mid);padding-left:6px;margin-bottom:2px}
.trk{margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.trk-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:background .1s}
.trk-hd:hover{background:var(--surface2)}
.trk-num{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:16px;font-weight:700}
.trk-ttl{flex:1;font-weight:600;font-size:12.5px;color:var(--text)}
.trk-chev{transition:transform .2s;color:var(--muted)}
.trk.open .trk-chev{transform:rotate(90deg)}
.trk-bd{display:none;padding:0 14px 13px;border-top:1px solid var(--border);background:var(--bg)}
.trk.open .trk-bd{display:block}
.trk-flds{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.trk-fld{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px}
.trk-flbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:3px}
.trk-fval{font-size:12px;color:var(--text2);font-weight:500}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:14px 0 6px}
.nbox{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;font-size:12.5px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.nxtbox{display:flex;align-items:center;gap:8px;background:var(--brand-dim);border:1px solid var(--brand-mid);border-radius:var(--r);padding:10px 13px;font-size:12.5px;color:var(--brand);font-weight:600}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(30,42,59,.4);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center}
.mov.open{display:flex}
.mo{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);width:460px;max-width:95vw;padding:24px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh2)}
.mo h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10.5px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 11px;outline:none;transition:all .12s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px var(--brand-dim)}
.fg textarea{resize:vertical;min-height:65px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mft{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.mfr{display:flex;gap:7px}
/* INDICATORS */
#saveInd{position:fixed;bottom:20px;left:20px;background:var(--surface);border:1px solid var(--border);color:var(--subtle);font-size:11px;font-family:var(--mono);font-weight:500;padding:5px 12px;border-radius:18px;display:flex;align-items:center;gap:5px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:400;box-shadow:var(--sh1)}
#connBadge{position:fixed;bottom:20px;left:20px;background:var(--surface);border:1px solid var(--border);font-size:10.5px;font-family:var(--mono);padding:4px 12px;border-radius:18px;display:none;align-items:center;gap:6px;z-index:399;box-shadow:var(--sh1)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:var(--r);transform:translateY(60px);opacity:0;transition:all .28s;z-index:600;box-shadow:var(--sh2);display:flex;align-items:center;gap:7px}
@media print{header,.btn,.toolbar,.stats,#toast,#saveInd,.pb,.fmo{display:none!important}body{background:#fff}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1.2" fill="white"/>
        <rect x="8" y="1" width="5" height="5" rx="1.2" fill="white" opacity=".7"/>
        <rect x="1" y="8" width="5" height="5" rx="1.2" fill="white" opacity=".7"/>
        <rect x="8" y="8" width="5" height="5" rx="1.2" fill="white" opacity=".4"/>
      </svg>
    </div>
    <span class="logo-text">Ticketing<em>Desk</em></span>
  </div>
  <div class="hsp"></div>
  <div id="countdown" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x=".5" y="1" width="10" height="9.5" rx="1.5" stroke="currentColor" stroke-width="1.1"/><path d="M3.5.5v2M7.5.5v2M.5 4h10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
    <span id="cdtxt"></span>
  </div>
  <button class="btn btn-outline btn-sm" onclick="exportAllPDF()" title="Exporter PDF" style="padding:6px 10px">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v9M4 7.5l3 3 3-3M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="btn btn-outline btn-sm" onclick="resetApp()" title="Réinitialiser" style="padding:6px 10px">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 6.5A4.5 4.5 0 1 1 9.5 3.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M11 1.5v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="btn btn-brand" onclick="openModal()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Nouveau ticket
  </button>
</header>

<main>

<!-- TICKETS -->
<div class="sec-hd">
  <div>
    <div class="sec-title">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" stroke="var(--brand)" stroke-width="1.6"/><path d="M5.5 6.5h7M5.5 9.5h7M5.5 12.5h4.5" stroke="var(--brand)" stroke-width="1.3" stroke-linecap="round"/></svg>
      Tickets
    </div>
    <p style="font-size:12px;color:var(--subtle);margin-top:3px;padding-left:28px">Cliquer sur une cellule pour modifier directement</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="syncBadge" style="display:none;font-family:var(--mono);font-size:10.5px;color:var(--muted);padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface2)"></span>
  </div>
</div>

<div class="stats">
  <div class="stat st-amb">
    <div class="sico"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7.5" stroke="var(--amber)" stroke-width="1.8"/><path d="M6.5 10A3.5 3.5 0 0 1 10 6.5" stroke="var(--amber)" stroke-width="2.2" stroke-linecap="round"/></svg></div>
    <div><div class="slbl">En cours</div><div class="sval" id="s-prog">0</div></div>
  </div>
  <div class="stat st-grn">
    <div class="sico"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7.5" stroke="var(--green)" stroke-width="1.8" fill="currentColor" fill-opacity=".07"/><path d="M6.5 10l2.5 2.5 4.5-4.5" stroke="var(--green)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><div class="slbl">Résolus</div><div class="sval" id="s-done">0</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="srch">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="var(--muted)" stroke-width="1.4"/><path d="M9 9l2.5 2.5" stroke="var(--muted)" stroke-width="1.4" stroke-linecap="round"/></svg>
    <input id="q" type="text" placeholder="Rechercher…" oninput="render()">
  </div>
  <select id="fst" onchange="render()">
    <option value="">Tous statuts</option>
    <option value="en-cours">En cours</option>
    <option value="résolu">Résolu</option>
  </select>
</div>

<div id="pBanner"></div>

// Mapping Supabase ↔ BuildDesk
// date_creation  → ticket.date
// date_relance1/2/3 → dernière relance = max(date_relance1,2,3)
// date_realisation (Supabase) → ticket.engagement (engagement prestataire)
// date_fermeture (custom dans commentaires) → ticket.resolution
// statut: 'Ouvert'/'Clos' ↔ 'en-cours'/'résolu'

function dbToTicket(r){
  // Lire les métadonnées BuildDesk stockées dans commentaires
  let meta={};
  try{
    const raw=r.commentaires||'';
    if(raw.startsWith('__BD_META__')) meta=JSON.parse(raw.slice(11));
  }catch(e){}

  // Reconstituer les relances depuis les champs Supabase + meta
  const rlDates=[r.date_relance1,r.date_relance2,r.date_relance3].filter(Boolean);
  let relances=[];
  if(meta.relances && meta.relances.length){
    // On a des relances complètes avec commentaires
    relances=meta.relances;
    // Ajouter les dates Supabase manquantes si besoin
    rlDates.forEach(d=>{
      if(!relances.find(rl=>rl.date===d))
        relances.push({date:d,comment:''});
    });
  } else {
    // Seulement les dates Supabase - on les affiche quand même
    relances=rlDates.map(d=>({date:d,comment:''}));
  }
  relances.sort((a,b)=>a.date.localeCompare(b.date));
  const lastRelance=relances.length?[...relances].sort((a,b)=>b.date.localeCompare(a.date))[0].date:'';

  return {
    _dbId:       r.id,
    title:       r.description || '(sans titre)',
    desc:        meta.desc || '',
    status:      (r.statut==='Clos'||r.statut==='Escaladé') ? 'résolu' : 'en-cours',
    date:        r.date_creation || '',
    lastRelance,
    relances,
    intervenant: meta.intervenant || '',
    soustraitant:meta.soustraitant || '',
    engagement:  r.date_realisation || meta.engagement || '',
    resolution:  meta.resolution || (r.statut==='Clos'?r.date_realisation:'') || '',
  };
}
function ticketToDb(t){
  const meta={desc:t.desc,intervenant:t.intervenant,soustraitant:t.soustraitant,engagement:t.engagement,resolution:t.resolution,relances:t.relances};
  const rl=t.relances||[];
  return {
    description: t.title,
    statut: t.status==='résolu'?'Clos':'Ouvert',
    date_creation: t.date||today(),
    date_relance1: rl[0]?.date||null,
    date_relance2: rl[1]?.date||null,
    date_relance3: rl[2]?.date||null,
    date_realisation: t.engagement||null,
    commentaires: '__BD_META__'+JSON.stringify(meta),
    photos:[],escalade:false
  };
}

// ── SUPABASE SYNC ──
async function syncFromSupabase(){
  if(!sb){ setConn('offline'); return; }
  setConn('sync');
  try{
    const {data,error}=await sb.from('tickets').select('*').order('id');
    if(error){
      console.warn('Supabase error:', error);
      setConn('err');
      return;
    }
    if(data && data.length > 0){
      // Merge: garder les données locales non-Supabase, remplacer le reste
      tickets = data.map(dbToTicket);
      saveLocal();
      render();
      setConn('ok', data.length);
    } else {
      // Table vide ou nouvelle base - garder les données locales
      setConn('empty');
    }
  } catch(e){
    console.warn('Supabase exception:', e);
    setConn('err');
  }
}
async function pushTicketToSb(t,isNew=false){
  if(!sb)return;
  const row=ticketToDb(t);
  try{
    if(isNew||!t._dbId){
      const {data,error}=await sb.from('tickets').insert(row).select().single();
      if(!error&&data)t._dbId=data.id;
    } else {
      await sb.from('tickets').upsert({...row,id:t._dbId});
    }
    saveLocal();
  }catch(e){}
}
async function deleteTicketFromSb(t){
  if(!sb||!t._dbId)return;
  await sb.from('tickets').delete().eq('id',t._dbId);
}
function setConn(state, count){
  const badge=document.getElementById('syncBadge');
  if(!badge)return;
  const map={
    sync:['⟳ Connexion Supabase…','var(--muted)'],
    ok:[`✓ ${count||''} tickets Supabase`,'var(--green)'],
    err:['⚠ Mode local (Supabase indisponible)','var(--amber)'],
    empty:['Supabase connecté — base vide','var(--muted)'],
    offline:['Mode local','var(--muted)']
  };
  const [lbl,col]=map[state]||['',''];
  badge.textContent=lbl;badge.style.color=col;badge.style.display='inline';
  if(state==='ok')setTimeout(()=>{badge.style.display='none';},4000);
  if(state==='offline')setTimeout(()=>{badge.style.display='none';},2000);
}

// ── STATS ──
function updateStats(){
  const p=tickets.filter(t=>t.status!=='résolu').length;
  const d=tickets.filter(t=>t.status==='résolu').length;
  document.getElementById('s-prog').textContent=p;
  document.getElementById('s-done').textContent=d;
  updateCountdown();
}
function updateCountdown(){
  const el=document.getElementById('countdown');
  const now=new Date();now.setHours(0,0,0,0);
  const next=meetings.filter(m=>m.nextDate).map(m=>new Date(m.nextDate)).filter(d=>d>=now).sort((a,b)=>a-b)[0];
  if(!next){el.style.display='none';return;}
  const diff=Math.round((next-now)/86400000);
  document.getElementById('cdtxt').textContent=diff===0?'Réunion aujourd\'hui':diff===1?'Réunion demain':`Réunion dans ${diff}j`;
  el.style.display='flex';
  el.classList.toggle('urg',diff<=3);
}

}
function chip2(s){return s==='terminee'?`<span class="chip cd">✓ Terminée</span>`:`<span class="chip cp">● Planifiée</span>`;}

// ── RELANCES display ──
function rlCol(rs){
  if(!rs||!rs.length)return'<span style="color:var(--muted);font-size:11px">—</span>';
  const colors=['#3B82F6','#F59E0B','#EF4444','#8B5CF6','#10B981'];
  return rs.map((r,i)=>`<div class="rl"><span class="rl-d" style="background:${colors[i%colors.length]}"></span><span style="font-size:11px">${fmt(r.date)}</span>${r.comment?`<span class="rl-cmt">${r.comment.length>30?r.comment.slice(0,30)+'…':r.comment}</span>`:''}</div>`).join('');
}

// ── RENDER TICKETS ──
function getFiltered(){
  const q=(document.getElementById('q')?.value||'').toLowerCase();
  const fs=document.getElementById('fst')?.value||'';
  const sOrd={'en-cours':0,'ouvert':0,'résolu':1};
  // compute lastRelance
  let rows=tickets.map((t,i)=>{
    const rl=t.relances||[];
    const last=rl.length?[...rl].sort((a,b)=>b.date.localeCompare(a.date))[0].date:'';
    return{...t,_i:i,_rc:rl.length,lastRelance:last||t.lastRelance||''};
  }).filter(t=>{
    const ns=t.status==='ouvert'?'en-cours':t.status;
    return(!q||t.title.toLowerCase().includes(q)||(t.intervenant||'').toLowerCase().includes(q)||(t.soustraitant||'').toLowerCase().includes(q))&&(!fs||ns===fs);
  });
  const dir=sDir==='asc'?1:-1;
  rows.sort((a,b)=>{
    if(sCol==='_rc')return dir*(a._rc-b._rc);
    if(sCol==='status')return dir*((sOrd[a.status]??0)-(sOrd[b.status]??0));
    return dir*String(a[sCol]||'').localeCompare(String(b[sCol]||''),'fr',{sensitivity:'base'});
  });
  return rows;
}
function sort(col){if(sCol===col)sDir=sDir==='asc'?'desc':'asc';else{sCol=col;sDir='asc';}render();}

          <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text2)" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''" onclick="chStatus(${t._i},'en-cours')"><span style="width:7px;height:7px;border-radius:50%;background:var(--amber)"></span>En cours</div>

function ed(el,i,field,multi=false){
  if(el.querySelector('input,textarea'))return;
  const inp=document.createElement(multi?'textarea':'input');

function buildDND(){

let dSrc=null;
function dDS(e,i){dSrc=i;setTimeout(()=>document.querySelector(`[data-i="${i}"]`)?.classList.add('dr'),0);}
function dDO(e,i){e.preventDefault();document.querySelectorAll('.dndi').forEach(d=>d.classList.remove('dov'));document.querySelector(`[data-i="${i}"]`)?.classList.add('dov');}
function dDD(e,i){e.preventDefault();document.querySelectorAll('.dndi').forEach(d=>d.classList.remove('dov','dr'));if(dSrc===null||dSrc===i)return;const a=wizIdxs.indexOf(dSrc),b=wizIdxs.indexOf(i);if(a>=0&&b>=0){wizIdxs.splice(a,1);wizIdxs.splice(b,0,dSrc);}buildDND();}
function buildWizBars(){document.getElementById('wbar').innerHTML=Array(wizTotal+2).fill(0).map((_,i)=>`<div class="ws" id="ws${i}"></div>`).join('');}
function showWizStep(s){
  wizStep=s;
  for(let i=0;i<=wizTotal+1;i++){const el=document.getElementById('ws'+i);if(el)el.className='ws'+(i<s?' done':i===s?' act':'');}
  document.getElementById('wlbl').textContent=s===0?'Étape 1 — Informations':s===wizTotal+1?'Étape finale — Notes':`Ticket ${s}/${wizTotal} — ${tickets[wizIdxs[s-1]]?.title||''}`;
  document.getElementById('wp0').classList.toggle('active',s===0);
  document.getElementById('wpFinal').classList.toggle('active',s===wizTotal+1);
  document.querySelectorAll('#dynPanels .wp').forEach(el=>el.classList.remove('active'));
  if(s>0&&s<=wizTotal){const el=document.getElementById('wdyn'+s);if(el)el.classList.add('active');}
  document.getElementById('btnPrev').style.display=s>0?'':'none';
  document.getElementById('btnNext').textContent=s===wizTotal+1?'💾 Enregistrer':'Suivant →';
}
function wizNav(d){

function buildDynPanels(){

function saveMeeting(){
  const title=document.getElementById('mT').value.trim();if(!title)return;
  const reviews=wizIdxs.map((ti,step)=>({ticketIdx:ti,newStatus:document.getElementById('ws'+step+'st')?.value||tickets[ti].status,statusAtTime:tickets[ti].status,responsable:document.getElementById('ws'+step+'rsp')?.value.trim()||'',decision:document.getElementById('ws'+step+'dec')?.value.trim()||'',comment:document.getElementById('ws'+step+'cmt')?.value.trim()||''}));

function dlCR(){
  const mi=crIdx;if(mi===null||mi===undefined)return;
  if(!window.jspdf){toast('jsPDF non chargé');return;}
  const m=meetings[mi];
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const ML=18,PW=210-ML*2;let y=18;
  const C={brand:[37,99,235],text:[30,42,59],muted:[155,163,175],green:[5,150,105],amber:[217,119,6]};
  doc.setFillColor(...C.brand);doc.rect(ML,y,PW,12,'F');
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('TicketingDesk — Compte Rendu',ML+4,y+8);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(fmt(today()),ML+PW-2,y+8,{align:'right'});y+=16;
  doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);doc.text(m.title,ML,y);y+=7;
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...C.muted);
  doc.text([fmt(m.date),m.lieu,m.participants].filter(Boolean).join(' · '),ML,y);y+=8;
  doc.setDrawColor(...C.brand);doc.setLineWidth(.4);doc.line(ML,y,ML+PW,y);y+=5;
  (m.ticketReviews||[]).forEach((r,ri)=>{
    const t=tickets[r.ticketIdx];if(!t)return;
    if(y>265){doc.addPage();y=18;}
    const ok=r.newStatus==='résolu';
    doc.setFillColor(...ok?[236,253,245]:[255,251,235]);doc.rect(ML,y,2.5,12,'F');
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);doc.text(`${ri+1}. ${t.title}`,ML+5,y+5);
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...ok?C.green:C.amber);doc.text(ok?'Résolu':'En cours',ML+PW-2,y+5,{align:'right'});y+=12;
    if(r.decision){doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...C.green);doc.text('✓ '+r.decision,ML+5,y);y+=5;}
    if(r.comment){doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(...C.muted);const ls=doc.splitTextToSize(r.comment,PW-10);doc.text(ls,ML+5,y);y+=ls.length*4;}
    y+=3;
  });
  if(m.notes){doc.setDrawColor(...C.muted);doc.line(ML,y,ML+PW,y);y+=5;doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);doc.text('Notes',ML,y);y+=5;doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(...C.text);const ls=doc.splitTextToSize(m.notes,PW);doc.text(ls,ML,y);}
  if(m.nextDate){y+=8;doc.setFillColor(239,246,255);doc.roundedRect(ML,y,PW,9,2,2,'F');doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...C.brand);doc.text('Prochaine réunion : '+fmt(m.nextDate),ML+4,y+6);}
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(...C.muted);doc.text(`TicketingDesk · ${fmt(today())}`,ML,290);
  doc.save(`CR_${(m.title||'reunion').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`);
  toast('PDF téléchargé ✓');
}

// ── EXPORT ALL PDF ──
function exportAllPDF(){
  if(!window.jspdf){toast('jsPDF non chargé');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const ML=12,PW=297-ML*2;let y=ML;
  const C={brand:[37,99,235],text:[30,42,59],text2:[61,77,99],muted:[155,163,175],border:[228,234,240],bg:[248,249,252],green:[5,150,105],amber:[217,119,6],red:[220,38,38]};
  const cols=[{l:'Sujet',w:62},{l:'Statut',w:20},{l:'Intervenant',w:32},{l:'Sous-traitant',w:32},{l:'Date création',w:24},{l:'Dern. relance',w:24},{l:'Engagement',w:24},{l:'Fermeture',w:24},{l:'Description',w:PW-62-20-32-32-24-24-24-24}];
  doc.setFillColor(...C.brand);doc.rect(ML,y,PW,12,'F');
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('TicketingDesk — Export tickets',ML+4,y+8);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(`${fmt(today())} · ${tickets.length} tickets`,ML+PW-2,y+8,{align:'right'});y+=16;
  // col headers
  doc.setFillColor(...C.bg);doc.setDrawColor(...C.border);doc.rect(ML,y,PW,7,'FD');
  doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...C.muted);
  let cx=ML;cols.forEach(c=>{doc.text(c.l.toUpperCase(),cx+2,y+4.8);cx+=c.w;});y+=7;
  // rows
  const rows=getFiltered();
  rows.forEach((t,ri)=>{
    doc.setFontSize(8);
    const hs=cols.map((c,ci)=>{
      const vals=[t.title,'',t.intervenant||'',t.soustraitant||'',fmt(t.date),fmt(t.lastRelance||''),fmt(t.engagement||''),fmt(t.resolution||''),t.desc||''];
      const v=vals[ci]||'';if(!v||v==='—')return 8;
      return Math.max(8,doc.splitTextToSize(v,c.w-4).length*4.2+3.6);
    });
    const rh=Math.max(...hs);
    if(y+rh>198){doc.addPage();y=ML;doc.setFillColor(...C.bg);doc.setDrawColor(...C.border);doc.rect(ML,y,PW,7,'FD');doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...C.muted);cx=ML;cols.forEach(c=>{doc.text(c.l.toUpperCase(),cx+2,y+4.8);cx+=c.w;});y+=7;}
    if(ri%2===0){doc.setFillColor(...C.bg);doc.rect(ML,y,PW,rh,'F');}
    doc.setDrawColor(...C.border);doc.setLineWidth(.2);doc.line(ML,y+rh,ML+PW,y+rh);
    const ok=t.status==='résolu';
    cx=ML;const ty=y+3.8;
    const vals=[t.title,'',t.intervenant||'',t.soustraitant||'',fmt(t.date),fmt(t.lastRelance||''),fmt(t.engagement||''),fmt(t.resolution||''),t.desc||''];
    cols.forEach((c,ci)=>{
      if(ci===1){
        const bw=16,bh=5,bx=cx+(c.w-bw)/2,by=y+(rh-bh)/2;
        doc.setFillColor(...ok?[236,253,245]:[255,251,235]);doc.setDrawColor(...ok?[167,243,208]:[253,230,138]);
        doc.roundedRect(bx,by,bw,bh,1.5,1.5,'FD');
        doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...ok?C.green:C.amber);
        doc.text(ok?'Résolu':'En cours',bx+bw/2,by+3.6,{align:'center'});
      } else {
        const v=vals[ci]||'';
        if(ci===0){doc.setFont('helvetica','bold');doc.setTextColor(...C.text);}
        else if(ci===8){doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(...C.muted);}
        else{doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...C.text2);}
        if(v&&v!=='—'){const ls=doc.splitTextToSize(v,c.w-4);ls.forEach((l,li)=>{if(ty+li*4.2<y+rh)doc.text(l,cx+2,ty+li*4.2);});}
        else if(ci>0){doc.setTextColor(...C.muted);doc.text('—',cx+2,ty);}
      }
      cx+=c.w;
    });
    y+=rh;
  });
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(...C.muted);
  doc.text(`TicketingDesk · Export ${fmt(today())} · ${rows.length} ticket${rows.length!==1?'s':''}`,ML,204);
  doc.save(`TicketingDesk_export_${today()}.pdf`);
  toast(`PDF exporté (${rows.length} tickets) ✓`);
}

document.getElementById('mCR').addEventListener('click',e=>{if(e.target===document.getElementById('mCR'))document.getElementById('mCR').classList.remove('open');});

render();
syncFromSupabase();
</script>
