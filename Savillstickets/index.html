<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  /* Neutres — la base de l'app */
  --bg:#F7F7F8;--card:#FFFFFF;--text:#16161A;--text2:#6B6B73;--text3:#A0A0A8;
  --border:#EAEAEC;--border2:#DCDCE0;

  /* Couleurs sémantiques — utilisées avec intention */
  --ouvert:#2563EB;       /* bleu : nouveau, à traiter */
  --encours:#D97706;      /* ambre : en cours, attention modérée */
  --clos:#16A34A;         /* vert : résolu, succès */
  --alerte:#DC2626;       /* rouge : urgent, bloqué, sans réponse */
  --accent:#16161A;       /* noir : actions neutres, UI */

  --r:14px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;background:#F4F5F7;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;font-size:15px;color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;}
#root{display:flex;flex-direction:column;height:100%;}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-top:calc(var(--st) + 60px);padding-bottom:calc(var(--sb) + 80px);}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--st) + 52px);padding-top:var(--st);background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding-left:16px;padding-right:16px;gap:10px;}
.topbar-title{font-size:17px;font-weight:700;flex:1;letter-spacing:-.2px;}
.topbar-back{font-size:17px;font-weight:500;color:var(--ouvert);background:none;border:none;cursor:pointer;padding:8px 0;white-space:nowrap;}

.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;height:calc(54px + var(--sb));padding-bottom:var(--sb);}
.botnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:600;color:var(--text3);padding:6px 4px;font-family:inherit;}
.botnav.active{color:var(--text);}
.botnav-icon{font-size:21px;line-height:1;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}

/* Statuts — couleur pleine quand ça compte */
.stat{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:8px;font-size:12px;font-weight:700;}
.stat::before{content:"";width:6px;height:6px;border-radius:50%;}
.stat-Ouvert{background:#EFF6FF;color:var(--ouvert);}
.stat-Ouvert::before{background:var(--ouvert);}
.stat-Encours{background:#FFFBEB;color:var(--encours);}
.stat-Encours::before{background:var(--encours);}
.stat-Clos{background:#F0FDF4;color:var(--clos);}
.stat-Clos::before{background:var(--clos);}
.stat-Escalade{background:#FEF2F2;color:var(--alerte);}
.stat-Escalade::before{background:var(--alerte);}

input,select,textarea{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:16px;color:var(--text);background:var(--card);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--ouvert);}
textarea{resize:none;line-height:1.5;}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.field{margin-bottom:15px;}

.btn{width:100%;padding:14px;border-radius:13px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:transform .08s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--bg);color:var(--text2);}
.btn-sm{padding:10px 16px;border-radius:10px;font-size:14px;width:auto;font-weight:600;}
.btn-outline{background:var(--card);color:var(--text);border:1.5px solid var(--border2);}
.btn-blue{background:#EFF6FF;color:var(--ouvert);}
.btn-green{background:#F0FDF4;color:var(--clos);}
.btn-orange{background:#FFFBEB;color:var(--encours);}
.btn-red{background:#FEF2F2;color:var(--alerte);}

.chip{flex-shrink:0;padding:7px 15px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none;margin-bottom:14px;}
.chips::-webkit-scrollbar{display:none;}

.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 8px;text-align:center;}
.kpi-val{font-size:25px;font-weight:800;line-height:1;letter-spacing:-.5px;}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.4px;}

.tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;}
.tcard:active{background:#FAFAFB;}
.tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border2);}
.tcard.is-alerte::before{background:var(--alerte);}
.tcard.is-escalade::before{background:var(--alerte);}
.tcard.is-clos::before{background:var(--clos);}
.tcard-title{font-size:15px;font-weight:600;line-height:1.4;margin:8px 0 9px;}
.date-row{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:2px;}
.date-lbl{color:var(--text3);}
.date-val{color:var(--text2);font-weight:500;}
.tcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.days-tag{font-size:11.5px;font-weight:600;}
.relance-btn{background:#EFF6FF;color:var(--ouvert);border:none;border-radius:9px;padding:6px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.relance-btn:active{opacity:.7;}
.alert-pill{font-size:11px;font-weight:700;color:var(--alerte);background:#FEF2F2;padding:3px 9px;border-radius:7px;}

.bubble{padding:11px 14px;border-radius:11px;margin-bottom:7px;font-size:14px;line-height:1.5;border-left:3px solid var(--border2);background:var(--card);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.bubble-meta{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px;}
.bubble-relance{border-left-color:var(--encours);}
.bubble-escalade{border-left-color:var(--alerte);background:#FEF8F8;}
.bubble-cloture{border-left-color:var(--clos);}

.sec-title{font-size:11.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 9px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.info-lbl{font-size:11px;color:var(--text3);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.info-val{font-size:14.5px;font-weight:600;color:var(--text);}
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.fab{position:fixed;right:18px;bottom:calc(var(--sb) + 68px);width:56px;height:56px;background:var(--accent);border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:27px;color:#fff;border:none;cursor:pointer;z-index:90;}
.fab:active{transform:scale(.92);}

.toast{position:fixed;top:calc(var(--st) + 60px);left:16px;right:16px;background:var(--accent);color:#fff;padding:13px 17px;border-radius:13px;font-size:14px;font-weight:600;z-index:999;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.2);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:22px 18px calc(var(--sb) + 22px);width:100%;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:13.5px;color:var(--text3);margin-bottom:18px;line-height:1.5;}

.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;}
.photo-add{width:100%;aspect-ratio:1;border-radius:10px;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text3);cursor:pointer;background:var(--bg);}
.photo-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;}
.photo-viewer img{max-width:100%;max-height:85vh;object-fit:contain;border-radius:8px;}
.photo-viewer-close{position:absolute;top:calc(var(--st)+16px);right:16px;color:#fff;font-size:30px;background:none;border:none;cursor:pointer;}

.login-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg);}
.login-icon{width:68px;height:68px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 20px;}
.login-box{width:100%;max-width:340px;}

/* DG */
.dg-num{font-size:36px;font-weight:800;line-height:1;letter-spacing:-1px;}
.dg-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px;}
.progress-bar{background:var(--border);border-radius:99px;height:7px;overflow:hidden;}
.progress-fill{height:7px;border-radius:99px;transition:width .5s ease;}
.dg-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.dg-stat{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;}
.dg-stat-val{font-size:23px;font-weight:800;line-height:1;}
.dg-stat-lbl{font-size:10px;font-weight:700;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.3px;}
.escalade-row{padding:11px 0;border-bottom:1px solid var(--border);}
.escalade-row:last-child{border-bottom:none;}
.timeline-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.timeline-item:last-child{border-bottom:none;}
.timeline-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px;}

/* RÉUNION */
.reu-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:9px;cursor:pointer;}
.reu-card:active{background:#FAFAFB;}
.reu-progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.reu-progress-txt{font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap;}
.reu-ticket-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;}
.reu-nav-btns{display:flex;gap:8px;margin-top:16px;}
.engagement-box{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:12px;padding:13px 15px;margin-top:6px;}
.engagement-tenu{background:#F0FDF4;border-color:#BBF7D0;}
.engagement-rompu{background:#FEF2F2;border-color:#FCA5A5;}
.engagement-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:7px;}
.engagement-pill.tenu{background:#F0FDF4;color:var(--clos);}
.engagement-pill.rompu{background:#FEF2F2;color:var(--alerte);}
.engagement-pill.attente{background:#FFFBEB;color:var(--encours);}
.engagement-pill.sansdate{background:#F3F4F6;color:var(--text2);}
.cr-section{margin-bottom:18px;}
.cr-ticket-block{border-left:3px solid var(--border2);padding-left:12px;margin-bottom:14px;}
.cr-ticket-block.rompu{border-left-color:var(--alerte);}
.cr-ticket-block.tenu{border-left-color:var(--clos);}
.promesse-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.promesse-row:last-child{border-bottom:none;}

/* ══════════════════════════════════════
   MODULE TICKETS — Tableau de bord pro / institutionnel
   ══════════════════════════════════════ */
:root{
  --nv-marine:#2563A8;
  --nv-marine-dark:#09326C;
  --nv-bg:#F4F5F7;
  --nv-card:#FFFFFF;
  --nv-border:#EBECF0;
  --nv-text:#1D2125;
  --nv-text2:#44546F;
  --nv-text3:#8590A2;
  --nv-ouvert:#0E7C6E;
  --nv-clos:#1F845A;
  --nv-alerte:#C9372C;
  --nv-ambre:#A54800;
}
.nv-screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#F4F5F7;padding-bottom:calc(var(--sb) + 80px);}tbody tr:nth-child(odd){background:#ECEEF1;}tbody tr:nth-child(even){background:#ffffff;}
.nv-header{background:#fff;padding:calc(var(--st) + 14px) 16px 10px;color:var(--nv-text);border-bottom:1px solid var(--nv-border);}
.nv-header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.nv-header-title{font-size:16px;font-weight:700;letter-spacing:.1px;color:var(--nv-text);}
.nv-header-user{font-size:11.5px;color:var(--nv-text3);font-weight:600;}
.nv-stats-row{display:flex;gap:8px;}
.nv-stat{flex:1;padding:8px 6px;text-align:center;background:#fff;border:1px solid var(--nv-border);border-radius:6px;}
.nv-stat-val{font-size:18px;font-weight:700;color:var(--nv-text);line-height:1;}
.nv-stat-lbl{font-size:9.5px;color:var(--nv-text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px;}

.nv-toolbar{display:flex;gap:8px;padding:8px 14px;background:var(--nv-card);border-bottom:1px solid var(--nv-border);align-items:center;}
.nv-search{flex:1;padding:7px 10px;border:1px solid var(--nv-border);border-radius:4px;font-size:14px;background:#FAFBFC;}
.nv-search:focus{outline:none;border-color:var(--nv-marine);}
.nv-sortbtn{padding:7px 10px;border:1px solid var(--nv-border);border-radius:4px;background:var(--nv-card);font-size:12px;font-weight:500;color:var(--nv-text2);cursor:pointer;white-space:nowrap;}

.nv-filterbar{display:flex;gap:0;background:var(--nv-card);border-bottom:1px solid var(--nv-border);padding:0 14px;}
.nv-filtertab{padding:8px 11px;font-size:12.5px;font-weight:500;color:var(--nv-text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.nv-filtertab.active{color:var(--nv-marine);font-weight:700;border-bottom-color:var(--nv-marine);}
.nv-filtertab .count{font-size:10.5px;color:var(--nv-text3);margin-left:3px;}

.nv-row{display:flex;align-items:center;gap:9px;padding:10px 14px;background:var(--nv-card);border-bottom:1px solid var(--nv-border);cursor:pointer;}
.nv-row:active{background:#FAFBFC;}
.nv-row-check{width:16px;height:16px;border:1.5px solid #C1C7D0;border-radius:3px;flex-shrink:0;}
.nv-row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nv-row-dot.ouvert{background:var(--nv-ouvert);}
.nv-row-dot.escalade{background:var(--nv-alerte);}
.nv-row-dot.clos{background:var(--nv-clos);}
.nv-row-main{flex:1;min-width:0;}
.nv-row-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px;}
.nv-row-id{font-size:10.5px;font-weight:600;color:var(--nv-text3);font-family:ui-monospace,monospace;}
.nv-row-title{font-size:14px;font-weight:500;color:var(--nv-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
.nv-row-meta{display:flex;gap:10px;font-size:11px;color:var(--nv-text3);}
.nv-row-meta b{color:var(--nv-text2);font-weight:600;}
.nv-tag{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;}
.nv-tag.ouvert{background:#E6F5F3;color:var(--nv-ouvert);}
.nv-tag.escalade{background:#FFECEB;color:var(--nv-alerte);}
.nv-tag.clos{background:#DFFCEC;color:var(--nv-clos);}
.nv-chevron{color:var(--nv-text3);font-size:14px;flex-shrink:0;}

.nv-empty{text-align:center;padding:60px 20px;color:var(--nv-text3);font-size:14px;}

.nv-fab{position:fixed;right:18px;bottom:calc(var(--sb) + 68px);width:52px;height:52px;background:var(--nv-marine);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;border:none;cursor:pointer;box-shadow:0 3px 10px rgba(12,102,228,.35);z-index:90;}

/* DÉTAIL TICKET */
.nv-detail-header{background:#fff;padding:calc(var(--st) + 10px) 14px 16px;color:var(--nv-text);border-bottom:1px solid var(--nv-border);}
.nv-detail-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.nv-detail-back{color:var(--nv-marine);background:none;border:none;font-size:14px;font-weight:600;cursor:pointer;padding:6px 0;}
.nv-detail-edit{color:var(--nv-marine);background:#E9F2FF;border:none;font-size:13px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:5px;}
.nv-detail-id{font-size:11px;color:var(--nv-text3);font-weight:600;font-family:ui-monospace,monospace;margin-bottom:5px;}
.nv-detail-title{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:10px;color:var(--nv-text);}
.nv-detail-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;}

.nv-section{background:var(--nv-card);margin-top:8px;}
.nv-section-hd{padding:9px 14px;background:#FAFBFC;border-top:1px solid var(--nv-border);border-bottom:1px solid var(--nv-border);font-size:11px;font-weight:700;color:var(--nv-text2);text-transform:uppercase;letter-spacing:.5px;}
.nv-section-body{padding:14px;}

.nv-field-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0F2F5;font-size:13.5px;}
.nv-field-row:last-child{border-bottom:none;}
.nv-field-lbl{color:var(--nv-text3);font-weight:500;}
.nv-field-val{color:var(--nv-text);font-weight:600;text-align:right;}
.nv-field-val.alerte{color:var(--nv-alerte);}
.nv-field-val.clos{color:var(--nv-clos);}
.nv-field-val.ambre{color:var(--nv-ambre);}

.nv-alert-banner{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#FFECEB;border-left:3px solid var(--nv-alerte);font-size:13px;color:#5D1715;line-height:1.5;}

.nv-engagement{padding:14px;border-left:3px solid var(--nv-ambre);background:#FFF7ED;}
.nv-engagement.tenu{border-left-color:var(--nv-clos);background:#EFFCF6;}
.nv-engagement.rompu{border-left-color:var(--nv-alerte);background:#FFECEB;}
.nv-engagement-status{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px;}
.nv-engagement-status.tenu{background:#DFFCEC;color:var(--nv-clos);}
.nv-engagement-status.rompu{background:#FFECEB;color:var(--nv-alerte);}
.nv-engagement-status.attente{background:#FFF1E0;color:var(--nv-ambre);}
.nv-engagement-status.sansdate{background:#F1F2F4;color:var(--nv-text2);}
.nv-engagement-text{font-size:14px;color:var(--nv-text);line-height:1.5;margin-bottom:6px;font-style:italic;}
.nv-engagement-date{font-size:12.5px;color:var(--nv-text2);}

.nv-actionbar{display:flex;gap:8px;padding:12px 14px;background:var(--nv-card);border-top:1px solid var(--nv-border);}
.nv-actionbtn{flex:1;padding:10px 8px;border-radius:4px;font-size:13px;font-weight:600;border:1px solid var(--nv-border);background:var(--nv-card);color:var(--nv-text2);cursor:pointer;font-family:inherit;}
.nv-actionbtn.primary{background:var(--nv-marine);color:#fff;border-color:var(--nv-marine);}
.nv-actionbtn.success{background:var(--nv-clos);color:#fff;border-color:var(--nv-clos);}
.nv-actionbtn.danger{background:#fff;color:var(--nv-alerte);border-color:#FFD2CC;}

.nv-comment{padding:10px 14px;border-bottom:1px solid #F0F2F5;}
.nv-comment:last-child{border-bottom:none;}
.nv-comment-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--nv-text3);font-weight:600;margin-bottom:3px;}
.nv-comment-text{font-size:13.5px;color:var(--nv-text);line-height:1.5;}
.nv-comment-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--nv-border);background:#FAFBFC;}
.nv-comment-input textarea{flex:1;border:1px solid var(--nv-border);border-radius:4px;padding:8px 10px;font-size:14px;resize:none;font-family:inherit;background:#fff;}
.nv-comment-send{background:var(--nv-marine);color:#fff;border:none;border-radius:4px;padding:0 16px;font-size:13px;font-weight:600;cursor:pointer;}

.nv-photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:14px;}
.nv-photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid var(--nv-border);}
.nv-photo-add{width:100%;aspect-ratio:1;border-radius:4px;border:1.5px dashed var(--nv-border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--nv-text3);cursor:pointer;background:#FAFBFC;}

/* LOGIN */
.nv-login-wrap{min-height:100%;display:flex;flex-direction:column;background:#fff;padding:0;}
.nv-login-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.nv-login-crest{width:52px;height:52px;background:var(--nv-marine);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px;}
.nv-login-title{font-size:21px;font-weight:700;color:var(--nv-text);text-align:center;letter-spacing:.1px;margin-bottom:4px;}
.nv-login-sub{font-size:12.5px;color:var(--nv-text3);text-align:center;margin-bottom:32px;text-transform:uppercase;letter-spacing:1px;}
.nv-login-card{background:#fff;border:1px solid var(--nv-border);border-radius:6px;padding:24px;width:100%;max-width:340px;}
.nv-login-label{font-size:11.5px;font-weight:700;color:var(--nv-text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block;}
.nv-login-input{width:100%;padding:11px 12px;border:1px solid var(--nv-border);border-radius:4px;font-size:16px;margin-bottom:14px;background:#FAFBFC;}
.nv-login-input:focus{outline:none;border-color:var(--nv-marine);}
.nv-login-btn{width:100%;padding:12px;background:var(--nv-marine);color:#fff;border:none;border-radius:4px;font-size:14.5px;font-weight:700;cursor:pointer;letter-spacing:.2px;}
.nv-login-err{color:var(--nv-alerte);font-size:12.5px;text-align:center;margin-top:10px;font-weight:600;}
.nv-login-foot{padding:16px;text-align:center;font-size:10.5px;color:var(--nv-text3);letter-spacing:.4px;}

/* MODALS */
.nv-modal-overlay{position:fixed;inset:0;background:rgba(9,30,66,.4);z-index:200;display:flex;align-items:flex-end;}
.nv-modal{background:#fff;border-radius:8px 8px 0 0;padding:0;width:100%;}
.nv-modal-hd{padding:18px 18px 14px;border-bottom:1px solid var(--nv-border);}
.nv-modal-title{font-size:16px;font-weight:700;color:var(--nv-text);margin-bottom:3px;}
.nv-modal-sub{font-size:12.5px;color:var(--nv-text3);line-height:1.5;}
.nv-modal-body{padding:16px 18px;}
.nv-modal-foot{display:flex;gap:8px;padding:14px 18px calc(var(--sb) + 18px);border-top:1px solid var(--nv-border);}
.nv-mfield{margin-bottom:14px;}
.nv-mfield label{display:block;font-size:11.5px;font-weight:700;color:var(--nv-text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.nv-mfield input,.nv-mfield textarea{width:100%;padding:10px 12px;border:1px solid var(--nv-border);border-radius:4px;font-size:15px;font-family:inherit;background:#FAFBFC;}
.nv-mfield input:focus,.nv-mfield textarea:focus{outline:none;border-color:var(--nv-marine);}

/* FORMULAIRE TICKET */
.nv-form-header{background:#fff;padding:calc(var(--st) + 12px) 16px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--nv-border);}
.nv-form-cancel{color:var(--nv-marine);background:none;border:none;font-size:14px;font-weight:600;cursor:pointer;}
.nv-form-title{color:var(--nv-text);font-size:15px;font-weight:700;}

/* RÉUNION */
.nv-reu-progress{height:3px;background:var(--nv-border);border-radius:0;overflow:hidden;}
.nv-reu-progress-fill{height:3px;background:var(--nv-marine);transition:width .4s;}
.nv-reu-counter{padding:9px 14px;background:#FAFBFC;border-bottom:1px solid var(--nv-border);font-size:11.5px;font-weight:700;color:var(--nv-text2);text-transform:uppercase;letter-spacing:.4px;}
.nv-reu-list-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#fff;border-bottom:1px solid var(--nv-border);cursor:pointer;}
.nv-reu-list-item:active{background:#FAFBFC;}

/* RAPPORT */
.nv-rep-headline{background:#fff;padding:16px;display:flex;align-items:flex-end;gap:16px;border-bottom:1px solid var(--nv-border);}
.nv-rep-num{font-size:36px;font-weight:700;color:var(--nv-text);line-height:1;}
.nv-rep-num-lbl{font-size:12px;color:var(--nv-text3);margin-bottom:4px;}
.nv-rep-grid{display:grid;grid-template-columns:1fr 1fr;}
.nv-rep-cell{padding:14px;border-right:1px solid var(--nv-border);border-bottom:1px solid var(--nv-border);background:#fff;}
.nv-rep-cell:nth-child(2n){border-right:none;}

function fmt(d){if(!d)return"—";try{return new Date(d+"T00:00:00").toLocaleDateString("fr-FR");}catch(e){return d;}}
function fmtLong(d){if(!d)return"—";try{return new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});}catch(e){return d;}}
function today(){return new Date().toISOString().slice(0,10);}
function nxId(arr){return arr.length>0?Math.max(...arr.map(function(x){return x.id||0;}))+1:1;}
function daysSince(d){if(!d)return null;return Math.round((new Date()-new Date(d+"T00:00:00"))/86400000);}
function lastRelance(t){return t.date_relance3||t.date_relance2||t.date_relance1||null;}
function nbRelances(t){return[t.date_relance1,t.date_relance2,t.date_relance3].filter(Boolean).length;}

// Repli : extrait les dates de relance/clôture depuis l'historique quand les colonnes structurées sont vides
// (cas des relances notées comme simples commentaires plutôt que via le bouton dédié)
function relancesFromHisto(t,histo){
  var struct=[t.date_relance1,t.date_relance2,t.date_relance3].filter(Boolean);
  if(struct.length>0)return struct;
  var entries=histo.filter(function(h){return h.ticket_id===t.id&&h.type_evenement==="Relance";})
    .map(function(h){return h.date;}).filter(Boolean).sort();
  return entries;
}
function realisationFromHisto(t,histo){
  if(t.date_realisation)return t.date_realisation;
  var entry=histo.filter(function(h){return h.ticket_id===t.id&&h.type_evenement==="Clôture";})
    .map(function(h){return h.date;}).filter(Boolean).sort().pop();
  return entry||"";
}
function isAlerte(t){if(t.statut==="Clos")return false;var d=lastRelance(t)||t.date_creation;return daysSince(d)>14;}
function statKey(t){
  var s=(t.statut||"").trim();
  if(s==="Clos")return"Clos";
  if(t.escalade)return"Escalade";
  return"Ouvert"; // toute autre valeur (Ouvert, En cours, vide, etc.) compte comme "en cours"
}
function statLabel(t){
  var s=(t.statut||"").trim();
  if(s==="Clos")return"Clos";
  if(t.escalade)return"Escaladé";
  return"En cours";
}
function vibrate(){try{if(navigator.vibrate)navigator.vibrate(20);}catch(e){}}

// ── Engagements gestionnaire (preuve de pression / promesses non tenues) ──
function engagementStatut(t){
  // sansdate | attente | tenu | rompu | aucun
  if(!t.engagement_gestionnaire)return"aucun";
  if(!t.date_engagement)return"sansdate";
  if(t.statut==="Clos"){
    // tenu si réalisé à la date promise ou avant
    if(t.date_realisation&&t.date_realisation<=t.date_engagement)return"tenu";
    return"rompu"; // clos mais après la promesse
  }
  // pas encore clos : rompu si la date promise est dépassée
  if(daysSince(t.date_engagement)>0)return"rompu";
  return"attente";
}
function engagementLabel(s){return{tenu:"Promesse tenue",rompu:"Promesse non tenue",attente:"En attente",sansdate:"Sans date précise",aucun:"—"}[s]||"—";}
function nbPromessesRompues(tickets){return tickets.filter(function(t){return engagementStatut(t)==="rompu";}).length;}
function nbPromessesTenues(tickets){return tickets.filter(function(t){return engagementStatut(t)==="tenu";}).length;}

function useToast(){
  const [t,setT]=useState(null);const ref=useRef(null);
  function show(msg){if(ref.current)clearTimeout(ref.current);setT(msg);ref.current=setTimeout(function(){setT(null);},2200);}
  return[t,show];
}

function App(){
  const [user,setUser]=useState(null);
  const [tickets,setTickets]=useState(TICKETS_INIT);
  const [histo,setHisto]=useState([]);
  const [reunions,setReunions]=useState([]);
  const [reunionsErr,setReunionsErr]=useState(null);
  const [prestataires,setPrestataires]=useState(function(){try{var s=localStorage.getItem("pds_prestataires");return s?JSON.parse(s):[];}catch(e){return[];}});
  const [view,setView]=useState("list");
  const [tab,setTab]=useState("list");
  const [selId,setSelId]=useState(null);
  const [selReunionId,setSelReunionId]=useState(null);
  const [toast,showToast]=useToast();
  const [modal,setModal]=useState(null);
  const loaded=useRef(false);

  useEffect(function(){
    if(!sb||!user||loaded.current)return;
    loaded.current=true;
    (async function(){
      try{
        var tk=await sb.from("tickets").select("*").order("id");
        if(tk.error){console.warn("Erreur tickets:",tk.error);}
        else if(tk.data){
          setTickets(tk.data.map(function(t){
            return{...t,photos:t.photos||[],escalade:t.escalade===true||t.escalade==="true"||t.escalade===1};
          }));
        }
        var hi=await sb.from("historique").select("*").order("date");
        if(hi.error){console.warn("Erreur historique:",hi.error);}
        else if(hi.data)setHisto(hi.data);
        var re=await sb.from("reunions").select("*").order("date",{ascending:false});
        if(re.error){
          console.warn("Erreur réunions:",re.error);
          setReunionsErr("Table introuvable — exécutez le SQL de création (voir README)");
        }else{
          setReunionsErr(null);
          if(re.data&&re.data.length>0)setReunions(re.data.map(function(r){
            var ids=r.ticket_ids;
            if(typeof ids==="string"){try{ids=JSON.parse(ids);}catch(e){ids=[];}}
            return{...r,ticket_ids:Array.isArray(ids)?ids:[]};
          }));
        }
      }catch(e){console.warn(e);}
    })();
  },[user]);

  const save=useCallback(async function(t){
    setTickets(function(prev){return prev.find(function(x){return x.id===t.id;})?prev.map(function(x){return x.id===t.id?t:x;}):[...prev,t];});
    if(!sb)return;
    try{var n={...t};delete n.photos;
      if(t._isNew){delete n._isNew;delete n.id;
        var r=await sb.from("tickets").insert(n).select().single();
        if(r.data)setTickets(function(prev){return prev.map(function(x){return x.id===t.id?{...r.data,photos:t.photos||[]}:x;});});
      }else{await sb.from("tickets").upsert(n);}
    }catch(e){console.warn(e);}
  },[]);

  const addH=useCallback(async function(tid,detail,auteur,type){
    var h={ticket_id:tid,type_evenement:type||"Commentaire",detail,details:detail,auteur:auteur||"AAG",date:today()};
    setHisto(function(prev){return[...prev,{...h,id:nxId(prev)}];});
    if(sb){try{await sb.from("historique").insert(h);}catch(e){}}
  },[]);

  const doRelance=useCallback(function(t,e){
    if(e)e.stopPropagation();
    vibrate();
    var upd={...t};
    if(!upd.date_relance1)upd.date_relance1=today();
    else if(!upd.date_relance2)upd.date_relance2=today();
    else upd.date_relance3=today();
    save(upd);
    addH(t.id,"Relance effectuée le "+fmtLong(today()),"AAG","Relance");
    showToast("Relance enregistrée");
  },[save,addH,showToast]);

  const doEscalade=useCallback(function(t){
    setModal({type:"escalade",ticket:t,onOk:function(raison){
      save({...t,statut:"Escaladé",escalade:true,escalade_date:today(),escalade_raison:raison});
      addH(t.id,"Escalade — "+raison+" — sans réponse après "+nbRelances(t)+" relance(s)","AAG","Escalade");
      showToast("Ticket escaladé");
      setModal(null);
    }});

  const doClose=useCallback(function(t,d){
    save({...t,statut:"Clos",date_realisation:d||today(),escalade:false});
    addH(t.id,"Ticket clôturé — réalisation le "+fmtLong(d||today()),"AAG","Clôture");
    showToast("Ticket clôturé");

  const setEngagement=useCallback(function(t,engagement,dateEng){

    if(engagement&&dateEng){
      addH(t.id,"Engagement gestionnaire noté en réunion : \""+engagement+"\" — promis pour le "+fmtLong(dateEng),"AAG","Engagement");

  const saveReunion=useCallback(async function(r){
    setReunions(function(prev){return prev.find(function(x){return x.id===r.id;})?prev.map(function(x){return x.id===r.id?r:x;}):[r,...prev];});
    if(!sb)return;
    try{
      var n={
        date:r.date||today(),
        participants:r.participants||"AAG, Gestionnaire",
        ticket_ids:JSON.stringify(r.ticket_ids||[]),
        notes:JSON.stringify(r.notes||{}),
        commentaire:r.commentaire||""
      };
      if(r._isNew){
        var res=await sb.from("reunions").insert(n).select().single();
        if(res.error){console.warn("Erreur save réunion:",res.error);}
        else if(res.data)setReunions(function(prev){return prev.map(function(x){return x.id===r.id?res.data:x;});});
      }else{
        var upd={...n,id:r.id};
        var res2=await sb.from("reunions").upsert(upd);
        if(res2.error)console.warn("Erreur update réunion:",res2.error);
      }
    }catch(e){console.warn("saveReunion exception:",e);}
  },[]);

  const deleteReunion=useCallback(async function(id){
    setReunions(function(prev){return prev.filter(function(r){return r.id!==id;});});
    if(!sb)return;
    try{await sb.from("reunions").delete().eq("id",id);}catch(e){console.warn("deleteReunion:",e);}

function Login({onLogin}){
  const [pwd,setPwd]=useState("");const [err,setErr]=useState(false);
  function go(){var r=MOTS_DE_PASSE[pwd.trim()];if(r){onLogin({...r});}else{setErr(true);setTimeout(function(){setErr(false);},1800);}}
  return React.createElement("div",{className:"nv-login-wrap"},
    React.createElement("div",{className:"nv-login-top"},
      React.createElement("div",{className:"nv-login-crest"},"🏢"),
      React.createElement("div",{className:"nv-login-title"},"Place de Seine"),
      React.createElement("div",{className:"nv-login-sub"},"Suivi des interventions"),
      React.createElement("div",{className:"nv-login-card"},
        React.createElement("label",{className:"nv-login-label"},"Mot de passe"),
        React.createElement("input",{
          className:"nv-login-input",type:"password",value:pwd,placeholder:"••••••••",
          style:err?{borderColor:"var(--nv-alerte)"}:{},
          onChange:function(e){setPwd(e.target.value);},onKeyDown:function(e){if(e.key==="Enter")go();}
        }),
        err&&React.createElement("div",{className:"nv-login-err"},"Mot de passe incorrect"),
        React.createElement("button",{className:"nv-login-btn",onClick:go},"Connexion")
      )
    ),
    React.createElement("div",{className:"nv-login-foot"},"PLACE DE SEINE — ACCÈS RÉSERVÉ")
  );

    var aA=isAlerte(a),bA=isAlerte(b);if(aA&&!bA)return-1;if(!aA&&bA)return 1;

    setIdx(0);
    setEngDraft({});
    setCommentaireReunion("");
    setPhase("reunion");
  }

  function ouvrirReunionExistante(r){
    setReuActive(r);
    setCommentaireReunion(r.commentaire||"");
    setIdx(0);
    setPhase("cr");

  function ticketCourant(){return ticketsOuverts[idx];}

  function validerEtSuivant(){
    var t=ticketCourant();

      var notes=Object.assign({},reuActive.notes||{});
      if(noteDraft.trim())notes[t.id]=noteDraft.trim();
      var decisions=Object.assign({},reuActive.decisions||{});
      if(decisionDraft.trim())decisions[t.id]=decisionDraft.trim();
      var dates_reso=Object.assign({},reuActive.dates_reso||{});
      if(pasDeDate){dates_reso[t.id]="SANS_DATE";}
      else if(dateResoDraft){dates_reso[t.id]=dateResoDraft;}
      setReuActive(function(p){return{...p,notes:notes,decisions:decisions,dates_reso:dates_reso};});
    }
    setNoteDraft("");
    setDecisionDraft("");
    setDateResoDraft("");
    setPasDeDate(false);
    if(idx<ticketsOuverts.length-1){
      setIdx(idx+1);
    }else{
      setPhase("commentaire_final");

  }

  function precedent(){
    setEngDraft({});setNoteDraft("");
    if(idx>0)setIdx(idx-1);
  }

  function terminerReunion(){
    var r={...reuActive,ticket_ids:ticketsOuverts.map(function(t){return t.id;}),commentaire:commentaireReunion};

          "CREATE TABLE IF NOT EXISTS reunions (\n  id bigint primary key,\n  date date,\n  participants text,\n  ticket_ids jsonb,\n  notes jsonb,\n  commentaire text\n);\nALTER TABLE reunions ENABLE ROW LEVEL SECURITY;\nCREATE POLICY \"allow all\" ON reunions FOR ALL USING (true);"

            !reunionsErr&&reunions.map(function(r,rowIdx){

function VuePreuve({tickets,reunions,histo}){
  var now=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});

  var total=tickets.length;

  var escalades=tickets.filter(function(t){return statKey(t)==="Escalade";});
  var clos=tickets.filter(function(t){return statKey(t)==="Clos";});
  var alertes=ouverts.filter(function(t){return isAlerte(t);});

  // Calcul total relances
  var totalRelances=tickets.reduce(function(s,t){return s+nbRelances(t);},0);

  // Délai moyen ouverture → cloture
  var delais=clos.filter(function(t){return t.date_creation&&t.date_realisation;}).map(function(t){
    return Math.round((new Date(t.date_realisation+"T00:00:00")-new Date(t.date_creation+"T00:00:00"))/86400000);
  });
  var delaiMoyen=delais.length?Math.round(delais.reduce(function(a,b){return a+b;},0)/delais.length):null;

  // Décisions non tenues = décision prise en réunion mais ticket pas clos et date dépassée
  var decisionsSansDate=[];
  var decisionsEnRetard=[];
  reunions.forEach(function(r){
    if(!r.decisions)return;
    Object.keys(r.decisions).forEach(function(tid){
      var t=tickets.find(function(x){return String(x.id)===String(tid);});
      if(!t||t.statut==="Clos")return;
      var dec=r.decisions[tid];
      var dateReso=r.dates_reso&&r.dates_reso[tid];
      if(dateReso==="SANS_DATE"){decisionsSansDate.push({ticket:t,decision:dec,reuDate:r.date});}
      else if(dateReso&&daysSince(dateReso)>0){decisionsEnRetard.push({ticket:t,decision:dec,datePromise:dateReso,reuDate:r.date});}
    });
  });

  // Tickets les plus anciens non clos

  // Score gestionnaire
  var decisionsTenues=reunions.reduce(function(acc,r){
    if(!r.decisions)return acc;
    return acc+Object.keys(r.decisions).filter(function(tid){
      var t=tickets.find(function(x){return String(x.id)===String(tid);});
      return t&&t.statut==="Clos";
    }).length;
  },0);
  var totalDecisions=decisionsTenues+decisionsEnRetard.length+decisionsSansDate.length;

  // Journal d'activité — construit depuis l'historique + les réunions
  var journalActivite=[];
  histo.forEach(function(h){
    var t=tickets.find(function(x){return x.id===h.ticket_id;});
    journalActivite.push({
      type:h.type_evenement||"Commentaire",
      label:h.detail||h.details||"",
      date:h.date,
      ticket:t?t.description:("#"+h.ticket_id)

    journalActivite.push({
      type:"Réunion",

      date:r.date,
      ticket:null

  });
  journalActivite.sort(function(a,b){return(b.date||"")>(a.date||"")?1:-1;});

  return React.createElement("div",{style:{height:"100%",display:"flex",flexDirection:"column"}},

        React.createElement("div",{className:"nv-stat",style:{borderTop:"3px solid var(--nv-alerte)"}},React.createElement("div",{className:"nv-stat-val",style:{color:decisionsEnRetard.length>0?"var(--nv-alerte)":"var(--nv-text3)"}},decisionsEnRetard.length+decisionsSansDate.length),React.createElement("div",{className:"nv-stat-lbl"},"Décisions non tenues"))

            React.createElement("div",{style:{fontSize:14,fontWeight:700,color:"var(--nv-text)",marginBottom:4}},d.ticket.description),
            React.createElement("div",{style:{fontSize:13,color:"var(--nv-text2)",fontStyle:"italic",marginBottom:4}},d.decision),
            React.createElement("div",{style:{fontSize:12.5,fontWeight:700,color:"var(--nv-ambre)"}},"⚠ Aucune date de résolution fournie")

            React.createElement("div",{style:{fontSize:10.5,fontWeight:700,color:"var(--nv-marine)",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}},"Mon action"),
            [
              ["Relances effectuées", totalRelances],
              ["Réunions organisées", reunions.length],
              ["Tickets ouverts", ouverts.length+escalades.length],

              return React.createElement("div",{key:i,style:{marginBottom:6}},

function VueSettings({prestataires,onSave}){
  const [list,setList]=useState(prestataires||[]);
  const [nouv,setNouv]=useState("");
  function add(){
    var v=nouv.trim();
    if(!v||list.includes(v))return;
    setList([...list,v]);
    setNouv("");
  }
  function remove(p){setList(list.filter(function(x){return x!==p;}));}
  return React.createElement("div",{style:{height:"100%",display:"flex",flexDirection:"column"}},
    React.createElement("div",{className:"nv-header"},
      React.createElement("div",{className:"nv-header-top"},
        React.createElement("span",{className:"nv-header-title"},"Réglages"),
        React.createElement("span",{className:"nv-header-user"})
      )
    ),
    React.createElement("div",{className:"nv-screen"},
      React.createElement("div",{className:"nv-section",style:{marginTop:0}},
        React.createElement("div",{className:"nv-section-hd"},"Prestataires"),
        list.map(function(p){
          return React.createElement("div",{key:p,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",borderBottom:"1px solid var(--nv-border)",background:"#fff"}},
            React.createElement("span",{style:{fontSize:14,fontWeight:500,color:"var(--nv-text)"}},p),
            React.createElement("button",{style:{background:"none",border:"none",color:"var(--nv-alerte)",fontSize:14,cursor:"pointer",fontWeight:700,padding:"4px 8px"},onClick:function(){remove(p);}},"✕")
          );
        }),
        list.length===0&&React.createElement("div",{style:{padding:"14px",fontSize:13,color:"var(--nv-text3)",fontStyle:"italic"}},"Aucun prestataire configuré"),
        React.createElement("div",{style:{display:"flex",gap:8,padding:"12px 14px",borderTop:"1px solid var(--nv-border)",background:"#FAFBFC"}},
          React.createElement("input",{
            style:{flex:1,border:"1px solid var(--nv-border)",borderRadius:5,padding:"9px 11px",fontSize:15,fontFamily:"inherit"},
            value:nouv,placeholder:"Nom du prestataire…",
            onChange:function(e){setNouv(e.target.value);},
            onKeyDown:function(e){if(e.key==="Enter")add();}
          }),
          React.createElement("button",{
            style:{background:"var(--nv-marine)",color:"#fff",border:"none",borderRadius:5,padding:"9px 16px",fontSize:14,fontWeight:700,cursor:"pointer"},
            onClick:add

          onClick:function(){onSave(list);}
        },"Enregistrer les réglages")
      )
    )
  );
}
