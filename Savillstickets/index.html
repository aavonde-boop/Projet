    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .anim-in{animation:fadeIn .3s ease forwards;}

    .sort-desc::after{content:" ↓";font-size:10px;opacity:.6;}
    .notif-bar{animation:pulse 3s infinite;}
    @keyframes savePulse{0%,100%{opacity:1}50%{opacity:.2}}
    .save-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);}

    .mob-row:last-child{border-bottom:none;}
    .mob-lbl{color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
    .cards-mobile{display:none;}
    /* Card & Button design system from index-5 */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;}
    .btn-primary{background:var(--accent);color:#fff;}

    .btn-success{background:var(--greenBg);border:1px solid rgba(22,163,74,.25);color:var(--green);}
    .btn-icon{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;line-height:1;transition:all .15s;color:var(--text2);}
    .btn-icon:hover{background:var(--surface2);border-color:var(--border2);}
    .inp{width:100%;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;transition:border-color .15s;}

    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:820px;max-height:92vh;overflow-y:auto;}
    .nav-item{position:relative;padding:5px 8px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:transparent;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:5px;}

    .nav-item.active{background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.25);}

    .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
    .tbl{width:100%;border-collapse:collapse;}
    .tbl th{padding:8px 12px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}

    .tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;color:var(--text);}
    .tbl tr:last-child td{border-bottom:none;}
    .tbl tr:hover td{background:var(--surface2);}
    .k-col-bg{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 8px;}
    .k-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;margin-bottom:7px;transition:all .15s;}
    .k-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08);}
    .toolbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden;}
    .chips-row{display:flex;gap:2px;padding:8px 10px;border-bottom:1px solid var(--border);}
    .toolbar-inner{display:flex;gap:8px;align-items:center;padding:10px 14px;flex-wrap:wrap;}
    .journal-entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;}
    .journal-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;margin-bottom:3px;}
    .journal-author{font-weight:700;color:var(--text2);}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);display:none;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -1px 0 var(--border),0 -8px 24px rgba(0,0,0,.08);z-index:1000;}
    .mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:none;background:transparent;font-size:9px;font-weight:600;color:var(--text3);cursor:pointer;border-top:2px solid transparent;transition:all .15s;}

    .mobile-nav-btn i{font-size:16px;}

    @media print{.topnav,.mobile-nav,.no-print{display:none!important}}

      // Si le prestataire a donné une date d'engagement et qu'elle n'est pas encore dépassée → pas d'alerte
      if(t.engagement_prestataire) {
        const engEc = Math.round((new Date(t.engagement_prestataire+"T00:00:00") - new Date()) / 86400000);
        if(engEc >= 0) return false;
      }
      // Si une échéance est définie et encore à plus de 7 jours → pas d'alerte
      if(t.echeance) {

      useEffect(function() {
        if (!unlocked) return;
        if (!sb) { setDbStatus("error"); setDbMsg("SDK Supabase non disponible"); return; }
        async function loadAll() {
          setDbStatus("loading");
          try {
            const [tkRes, prRes, reRes, deRes, hiRes, phRes] = await Promise.all([
              sb.from("tickets").select("*").order("id"),
              sb.from("prestataires").select("*").order("id"),
              sb.from("reunions").select("*").order("id"),
              sb.from("decisions").select("*").order("id"),
              sb.from("historique").select("*").order("id"),
              sb.from("photos").select("*").order("id"),
            ]);
            if (tkRes.error) throw tkRes.error;
            if (tkRes.data && tkRes.data.length === 0) {
              await seedInitialData();
              return loadAll();
            }
            var tkData = tkRes.data || INIT_TICKETS;
            var hiData = hiRes.data || INIT_HISTO;

              if(t.statut==="Clos"||t.statut==="Clos en désaccord") return t;
              var av = t.avancement || 0;
              var hasPC = hiData.some(function(h){
                return h.ticket_id===t.id && h.type_evenement==="Commentaire"
                  && h.auteur && h.auteur!=="AAG" && !h.auteur.toLowerCase().includes("aag");
              });
              if(hasPC && av<40) av=40;
              if(t.engagement_prestataire&&t.engagement_prestataire.trim()&&av<40) av=40;

      async function seedInitialData() {
        try {
          await sb.from("prestataires").insert(INIT_PRESTA);

      // ─── HELPERS SUPABASE ───
      // Champs optionnels pas forcément présents dans toutes les BD
      const OPTIONAL_COLS = {
        tickets: ["reponse_prestataire","engagement_prestataire","date_intervention_prevue",
                  "journal_interventions","derniere_relance"]
      };
      const excludedCols = {};
      function filterRow(table, row) {
        const excl = excludedCols[table] || [];
        const filtered = {};
        Object.keys(row).forEach(k => { if (!excl.includes(k)) filtered[k] = row[k]; });
        return filtered;
      }
      async function sbSafeUpsert(table, row) {
        // Essai 1 : avec tous les champs
        let toSend = filterRow(table, row);
        const { error: e1 } = await sb.from(table).upsert(toSend);
        if (!e1) return;
        // Erreur → retirer les champs optionnels un par un
        const opts = OPTIONAL_COLS[table] || [];
        for (const col of opts) {
          if (!excludedCols[table]) excludedCols[table] = [];
          if (!excludedCols[table].includes(col)) excludedCols[table].push(col);
        }
        // Essai 2 : sans les champs optionnels
        toSend = filterRow(table, row);
        const { error: e2 } = await sb.from(table).upsert(toSend);
        if (e2) { const msg=e2.message||(e2.details||JSON.stringify(e2)); setDbStatus("error"); setDbMsg(msg); showToast("❌ "+msg,"error"); }
      }
      async function sbSafeInsert(table, row) {
        let toSend = filterRow(table, row);
        const { data: d1, error: e1 } = await sb.from(table).insert(toSend).select().single();
        if (!e1) return d1;
        // Erreur → retirer les champs optionnels
        const opts = OPTIONAL_COLS[table] || [];
        for (const col of opts) {
          if (!excludedCols[table]) excludedCols[table] = [];
          if (!excludedCols[table].includes(col)) excludedCols[table].push(col);
        }
        toSend = filterRow(table, row);
        const { data: d2, error: e2 } = await sb.from(table).insert(toSend).select().single();
        if (e2) { const msg=e2.message||(e2.details||JSON.stringify(e2)); setDbStatus("error"); setDbMsg(msg); showToast("❌ "+msg,"error"); return null; }
        return d2;
      }

      async function sbUpsert(table, row) {
        if (!sb) return;
        setDbStatus("saving");
        if (table==="tickets") { await sbSafeUpsert(table,row); setDbStatus("ok"); return; }
        const { error } = await sb.from(table).upsert(row);
        if (error) { const msg=error.message||(error.details||JSON.stringify(error)); console.error("Erreur upsert "+table+":", error); setDbStatus("error"); setDbMsg(msg); showToast("❌ "+msg, "error"); }
        else { setDbStatus("ok"); }
      }
      async function sbDelete(table, id) {
        if (!sb) return;
        setDbStatus("saving");
        const { error } = await sb.from(table).delete().eq("id", id);
        if (error) { console.error("Erreur delete "+table+":", error); setDbStatus("error"); setDbMsg(error.message); showToast("❌ Erreur suppression : "+error.message, "error"); }
        else { setDbStatus("ok"); }
      }
      async function sbInsert(table, row) {
        if (!sb) return null;
        setDbStatus("saving");
        let data;
        if (table==="tickets") { data = await sbSafeInsert(table,row); }
        else {
          const res = await sb.from(table).insert(row).select().single();
          if (res.error) { const msg=res.error.message||(res.error.details||JSON.stringify(res.error)); console.error("Erreur insert "+table+":", res.error); setDbStatus("error"); setDbMsg(msg); showToast("❌ "+msg,"error"); return null; }
          data = res.data;

              await sb.from("photos").delete().neq("id", 0);

              await sb.from("prestataires").delete().neq("id", 0);
              if (data.prestataires?.length) await sb.from("prestataires").insert(data.prestataires);
              if (data.tickets?.length) await sb.from("tickets").insert(data.tickets);
              if (data.reunions?.length) await sb.from("reunions").insert(data.reunions);
              if (data.decisions?.length) await sb.from("decisions").insert(data.decisions);
              if (data.historique?.length) await sb.from("historique").insert(data.historique);
              if (data.photos?.length) await sb.from("photos").insert(data.photos);
            }
            setTickets(data.tickets || INIT_TICKETS);
            setPresta(data.prestataires || INIT_PRESTA);
            setReunions(data.reunions || INIT_REUNIONS);
            setDecisions(data.decisions || INIT_DECISIONS);
            setHisto(data.historique || INIT_HISTO);
            setPhotos(data.photos || []);
            setSelTicket(null);
            setSelReunion(null);
            setDbStatus("ok");
            alert("Import réussi ! " + data.tickets.length + " ticket(s) importé(s) dans Supabase.");
          } catch(err) {
            setDbStatus("error"); setDbMsg(err.message);
            alert("Erreur lors de la lecture du fichier JSON : " + err.message);
          }
        };
        reader.readAsText(file);

        const nbSansDate = ouvert.filter(t=>!t.engagement_prestataire&&!t.echeance).length;

          const p = presta.find(x=>x.id===t.prestataire_id);

          const engagStr = t.engagement_prestataire ? new Date(t.engagement_prestataire+"T00:00:00").toLocaleDateString("fr-FR") : null;
          const retardEc = t.echeance ? ecart(t.echeance) : null;

        return (po[a.priorite]||1)-(po[b.priorite]||1);
      });

      };

      var demarrerReunion=function(r){
        setReuActive(r);
        setTicketIdx(0);
        // Pré-remplir avec la note AAG (t.commentaires) uniquement
        var preNotes={};
        tickets.forEach(function(t){
          if(t.commentaires&&t.commentaires.trim()) preNotes["aag_"+t.id]=t.commentaires;
        });

        setPhase("liste");
        setReuActive(null);

            pType.length===0

              : React.createElement(DonutChart,{data:pType,colors:pType.map(function(d){return d.color;})})

    function VueHistorique({histo,tickets,presta,onSelectTicket,onDeleteHisto}){
      const [filterTicket,setFilterTicket]=useState("");
      const [filterType,setFilterType]=useState("");
      const [filterDate,setFilterDate]=useState("");
      const [search,setSearch]=useState("");

      const types=[...new Set(histo.map(h=>h.type_evenement))].sort();
      const tc={"Création":C.blue,"Relance":C.orange,"Changement statut":"#9B59B6","Réunion":C.orange,"Clôture":C.green,"Mail envoyé":"#0078D4","Réouverture":"#E67E22"};
      const icons={"Création":"+","Relance":"↻","Clôture":"✓","Réunion":"📋","Mail envoyé":"✉","Réouverture":"↩","Changement statut":"⇄"};

      const filtered = histo
        .filter(h=>{
          if(filterTicket && String(h.ticket_id)!==filterTicket) return false;
          if(filterType && h.type_evenement!==filterType) return false;
          if(filterDate && h.date < filterDate) return false;
          if(search){
            const s=search.toLowerCase();
            const tk=tickets.find(t=>t.id===h.ticket_id);
            if(!(h.detail||"").toLowerCase().includes(s) && !(tk&&tk.description.toLowerCase().includes(s))) return false;
          }
          return true;
        })
        .sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);

      const grouped={};
      filtered.forEach(h=>{
        const month=h.date.slice(0,7);
        if(!grouped[month]) grouped[month]=[];
        grouped[month].push(h);
      });
      const months=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

      const fmtMonth=m=>{const [y,mo]=m.split("-");const names=["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];return names[parseInt(mo)]+" "+y;};

      return React.createElement("div",null,
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          React.createElement("h1",{style:{fontSize:22,fontWeight:700,color:"#7C3AED"}},"📜 Historique global"),
          React.createElement("span",{style:{fontSize:13,color:"var(--text3)"}},filtered.length+" événement"+(filtered.length>1?"s":""))

        React.createElement(Card,{style:{marginBottom:16}},
          React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}},

            React.createElement("select",{value:filterTicket,onChange:e=>setFilterTicket(e.target.value),style:{padding:"6px 10px",borderRadius:6,border:"1px solid var(--border2)",fontSize:13}},
              React.createElement("option",{value:""},"Tous les tickets"),
              tickets.map(t=>React.createElement("option",{key:t.id,value:String(t.id)},"#"+t.id+" — "+t.description.slice(0,35)))
            ),
            React.createElement("select",{value:filterType,onChange:e=>setFilterType(e.target.value),style:{padding:"6px 10px",borderRadius:6,border:"1px solid var(--border2)",fontSize:13}},
              React.createElement("option",{value:""},"Tous les types"),
              types.map(tp=>React.createElement("option",{key:tp,value:tp},tp))
            ),
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--text3)"}},
              React.createElement("span",null,"Depuis :"),
              React.createElement("input",{type:"date",value:filterDate,onChange:e=>setFilterDate(e.target.value),style:{padding:"4px 8px",borderRadius:6,border:"1px solid var(--border2)",fontSize:12,flex:1}})
            ),
            React.createElement("button",{onClick:()=>{setFilterTicket("");setFilterType("");setFilterDate("");setSearch("");},
              style:{padding:"6px 10px",borderRadius:6,border:"1px solid var(--border2)",background:"var(--surface2)",fontSize:12,cursor:"pointer",color:"var(--text3)"}
            },"✕ Réinitialiser")
          )
        ),
        filtered.length===0
          ? React.createElement(Card,null,React.createElement("div",{style:{textAlign:"center",color:"var(--text3)",padding:"32px 0",fontSize:14}},"Aucun événement trouvé."))
          : months.map(month=>
            React.createElement("div",{key:month,style:{marginBottom:24}},
              React.createElement("div",{style:{fontWeight:700,fontSize:13,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:10,paddingLeft:4}},fmtMonth(month)+" · "+grouped[month].length+" événement"+(grouped[month].length>1?"s":"")),
              React.createElement(Card,null,
                React.createElement("div",{style:{position:"relative"}},
                  grouped[month].map((h,i)=>{
                    const col=tc[h.type_evenement]||C.gray;
                    const tk=tickets.find(t=>t.id===h.ticket_id);
                    const pr=tk?presta.find(p=>p.id===tk.prestataire_id):null;
                    return React.createElement("div",{key:h.id,style:{display:"flex",gap:12,marginBottom:i<grouped[month].length-1?16:0,paddingBottom:i<grouped[month].length-1?16:0,borderBottom:i<grouped[month].length-1?"1px solid #F3F4F6":"none"}},
                      React.createElement("div",{style:{width:28,height:28,borderRadius:"50%",background:col,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700}},
                        icons[h.type_evenement]||"→"
                      ),
                      React.createElement("div",{style:{flex:1,minWidth:0}},
                        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:2}},
                          React.createElement("span",{style:{fontWeight:700,fontSize:13,color:col}},h.type_evenement),
                          React.createElement("span",{style:{fontSize:11,color:"var(--text3)"}},fmt(h.date)+" · "+h.auteur)
                        ),
                        h.detail && React.createElement("div",{style:{fontSize:13,color:"var(--text2)",marginBottom:tk?4:0}},h.detail),
                        tk && React.createElement("button",{
                          onClick:()=>onSelectTicket(tk),

                        },"→ Ticket #"+tk.id+" — "+tk.description.slice(0,50)+(tk.description.length>50?"…":""))
                      ),
                      onDeleteHisto && React.createElement("button",{
                        onClick:()=>{if(confirm("Supprimer cet élément ?")) onDeleteHisto(h.id);},

                        onMouseOver:e=>e.currentTarget.style.color=C.red,
                        onMouseOut:e=>e.currentTarget.style.color="#CBD5E1"
                      },"×")
                    );
                  })
                )
              )
            )
          )
      );
    }

    // VUE PLANNING — PROCHAINS ÉVÉNEMENTS
    // ═══════════════════════════════════════
    function VuePlanning({tickets,reunions,presta,onSelectTicket}){
      const now = new Date(); now.setHours(0,0,0,0);
      const [horizon,setHorizon] = useState(30);

      const tN = new Date(now); tN.setDate(tN.getDate()+horizon);

      const upcoming=[];
      tickets.filter(t=>!isClos(t)&&t.echeance).forEach(t=>{
        const d=new Date(t.echeance+"T00:00:00");
        if(d>=now&&d<=tN) upcoming.push({date:t.echeance,type:"Échéance",label:"#"+t.id+" — "+t.description,color:PRIO_C[t.priorite]||C.blue,badgeBg:PRIO_C[t.priorite]+"22",ticket:t,prio:t.priorite});
      });
      tickets.filter(t=>!isClos(t)&&t.engagement_prestataire).forEach(t=>{
        const pr=presta.find(x=>x.id===t.prestataire_id);
        const d=new Date(t.engagement_prestataire+"T00:00:00");
        if(d>=now&&d<=tN) upcoming.push({date:t.engagement_prestataire,type:"Engagement",label:"#"+t.id+" — "+t.description+(pr?" ("+pr.nom+")":""),color:"#7C3AED",badgeBg:"#F5F3FF",ticket:t});
      });
      reunions.forEach(r=>{
        const d=new Date(r.date+"T00:00:00");
        const pr=presta.find(x=>x.id===r.prestataire_id);
        if(d>=now&&d<=tN) upcoming.push({date:r.date,type:"Réunion",label:"Réunion "+(pr?pr.nom:""),color:C.orange,badgeBg:"#FFF7ED"});
      });
      upcoming.sort((a,b)=>a.date.localeCompare(b.date));

      // Grouper par date
      const grouped={};
      upcoming.forEach(ev=>{
        if(!grouped[ev.date]) grouped[ev.date]=[];
        grouped[ev.date].push(ev);
      });
      const dates=Object.keys(grouped).sort();

      const TYPE_C={"Échéance":C.red,"Engagement":"#7C3AED","Réunion":C.orange};
      const TYPE_BG={"Échéance":"#FEF2F2","Engagement":"#F5F3FF","Réunion":"#FFF7ED"};

      return React.createElement("div",null,
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
          React.createElement("h1",{style:{fontSize:22,fontWeight:700,color:"#0891B2"}},"\u{1F4C5} Prochains événements"),
          React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            React.createElement("span",{style:{fontSize:13,color:"var(--text3)"}},"Horizon :"),
            [7,14,30,60,90].map(h=>React.createElement("button",{key:h,onClick:()=>setHorizon(h),
              style:{background:horizon===h?"#0891B2":"#fff",color:horizon===h?"#fff":"#374151",border:"1px solid "+(horizon===h?"#0891B2":"#D1D5DB"),borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}},
              h+"j"
            ))
          )
        ),
        upcoming.length===0 && React.createElement(Card,{style:{textAlign:"center",padding:48,color:"var(--text3)"}},
          React.createElement("div",{style:{fontSize:32,marginBottom:8}},"\u{1F4C5}"),
          React.createElement("div",{style:{fontSize:15,fontWeight:500}},"Aucun événement dans les "+horizon+" prochains jours"),
          React.createElement("div",{style:{fontSize:13,marginTop:4}},"Ajoutez des échéances sur vos tickets ou planifiez des réunions.")
        ),
        dates.length>0 && React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          dates.map(date=>{
            const evs=grouped[date];
            const d=new Date(date+"T00:00:00");
            const diff=Math.round((d-now)/86400000);
            const isToday=diff===0; const isTomorrow=diff===1;
            const dayLabel=isToday?"Aujourd'hui":isTomorrow?"Demain":d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
            return React.createElement("div",{key:date},
              React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
                React.createElement("div",{style:{fontWeight:600,fontSize:13,color:isToday?"#DC2626":diff<=3?"#B45309":"#374151"}},dayLabel),
                diff>0 && React.createElement("div",{style:{fontSize:11,color:"var(--text3)"}},"dans "+diff+" jour"+(diff>1?"s":"")),
                React.createElement("div",{style:{flex:1,height:"1px",background:"#E5E7EB"}})
              ),
              React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
                evs.map((ev,i)=>React.createElement("div",{key:i,
                  onClick:ev.ticket?()=>onSelectTicket(ev.ticket):undefined,
                  style:{display:"flex",alignItems:"center",gap:12,background:"var(--surface)",border:"0.5px solid #E5E7EB",borderLeft:"4px solid "+ev.color,borderRadius:8,padding:"10px 14px",cursor:ev.ticket?"pointer":"default"}},
                  React.createElement("div",{style:{background:TYPE_BG[ev.type],color:TYPE_C[ev.type],fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,whiteSpace:"nowrap"}},ev.type),

                ))
              )
            );
          })
        )
      );
    }

    function VueMonPlanning({tickets,presta,updateTicket,addH,histo,userLabel,userRole}){
      const [newEntry,setNewEntry]=useState("");
      const [showJournal,setShowJournal]=useState(null);
      var PRIO_DOT={"Haute":"#DC2626","Moyenne":"#F59E0B","Basse":"#16A34A"};

      function avancementAuto(t,overrides){
        var merged=Object.assign({},t,overrides||{});
        if(isClos(merged)) return 100;
        var base=merged.avancement;
        if(merged.date_intervention_prevue && base<60) base=60;
        if(merged.engagement_prestataire && base<40) base=40;
        // reponse_prestataire remplacé par commentaires histo (géré dans saveJournal)
        if((merged.derniere_relance||merged.date_creation) && base<20) base=20;
        return base;
      }

      function onSetIntervention(t,date){
        var newAv=avancementAuto(t,{date_intervention_prevue:date,avancement:Math.max(t.avancement,60)});
        updateTicket(t.id,{date_intervention_prevue:date,avancement:newAv});
        if(newAv!==t.avancement) addH(t.id,"Commentaire","","","Date intervention fixée : "+date+" → avancement "+newAv+"%",userLabel||"Prestataire");
      }
      function onSetEngagement(t,date){
        var newAv=avancementAuto(t,{engagement_prestataire:date,avancement:Math.max(t.avancement,40)});
        updateTicket(t.id,{engagement_prestataire:date,avancement:newAv});
        if(newAv!==t.avancement) addH(t.id,"Commentaire","","","Engagement saisi : "+date+" → avancement "+newAv+"%",userLabel||"Prestataire");
      }
      function onSetReponse(t,val){
        var newAv=avancementAuto(t,{reponse_prestataire:val,avancement:Math.max(t.avancement,val.trim()?40:t.avancement)});
        updateTicket(t.id,{reponse_prestataire:val,avancement:newAv});
      }
      function saveJournal(t,texte){
        if(!texte.trim())return;
        var entry={date:new Date().toISOString().slice(0,10),auteur:userLabel||"Prestataire",texte:texte.trim(),ts:Date.now()};
        var journal=[...(t.journal_interventions||[]),entry];
        // Un commentaire prestataire = retour reçu → avancement 40% minimum
        var isPrestaComment = userLabel && userLabel!=="AAG" && !userLabel.toLowerCase().includes("aag");
        var newAv = isPrestaComment ? Math.max(t.avancement,40) : t.avancement;
        var updates = {journal_interventions:journal};
        if(newAv !== t.avancement) updates.avancement = newAv;
        updateTicket(t.id,updates);
        addH(t.id,"Commentaire","","",entry.texte,userLabel||"Prestataire");
        if(newAv !== t.avancement) addH(t.id,"Changement avancement",""+t.avancement,""+newAv,"Commentaire recu → avancement "+newAv+"%",userLabel||"Prestataire");
        setNewEntry("");setShowJournal(null);
      }

      // Trouver le prestataire correspondant au userLabel (si connecté en tant que prestataire)
      var myPresta=presta.find(function(p){return p.nom&&userLabel&&p.nom.toLowerCase()===userLabel.toLowerCase();});
      var myPrestaId=myPresta?myPresta.id:null;

      // Tous les tickets non clos — si prestataire identifié: filtrer par prestataire_id
      // sinon afficher tous (vue admin en mode prestataire)
      var myTickets=tickets.filter(function(t){
        if(isClos(t))return false;
        if(myPrestaId) return t.prestataire_id===myPrestaId;

      }).sort(function(a,b){
        var po={"Haute":0,"Moyenne":1,"Basse":2};

        if(ad!==bd)return ad-bd;
        return (po[a.priorite]||1)-(po[b.priorite]||1);
      });

      var avLabel=function(v){return v===0?"À lancer":v===20?"📧 Mail envoyé":v===40?"↩ Retour reçu":v===60?"📅 Date confirmée":v===80?"🔨 En cours":"✅ Terminé";};
      var avBgFn=function(v){return v>=80?"#059669":v>=60?"#7C3AED":v>=40?"#B45309":v>=20?"#2563EB":"#9CA3AF";};

        React.createElement("div",{style:{fontSize:13,color:"var(--text3)"}},"Aucun ticket en cours assigné.")
      );

          [{l:"En cours",v:myTickets.length,c:"#2563EB",bg:"#EFF6FF"},
           {l:"Haute priorité",v:myTickets.filter(function(t){return t.priorite==="Haute";}).length,c:"#DC2626",bg:"#FEF2F2"},

                    comms.slice().reverse().map(function(h,i){
                      var isPresta=h.auteur&&h.auteur!=="AAG"&&!h.auteur.toLowerCase().includes("aag");
                      return React.createElement("div",{key:i,style:{display:"flex",gap:10,alignItems:"flex-start"}},
                        React.createElement("div",{style:{width:28,height:28,borderRadius:"50%",background:isPresta?"var(--orange)":"#8B5CF6",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700}},
                          (h.auteur||"?").slice(0,1).toUpperCase()
                        ),
                        React.createElement("div",{style:{flex:1,background:isPresta?"var(--orangeBg)":"#F5F3FF",borderRadius:8,padding:"7px 12px",border:"1px solid "+(isPresta?"#FDDCB5":"#DDD6FE")}},
                          React.createElement("div",{style:{fontSize:10,fontWeight:700,color:isPresta?"var(--orange)":"#7C3AED",marginBottom:3}},
                            (h.auteur||"?")+" · "+new Date((h.date_evenement||h.date||"")+"T00:00:00").toLocaleDateString("fr-FR")
                          ),
                          React.createElement("div",{style:{fontSize:12,color:"var(--text)",lineHeight:1.5}},h.details||h.detail||"")
                        )
                      );
                    })
                  );
                })()
              )
            )
          );
        })
      );
    }

    // ═══════════════════════════════════════
    // VUE RELANCES & NOTIFICATIONS
    // ═══════════════════════════════════════
    function VueRelances({tickets,presta,onSelectTicket,onUpdate}){
      var today0=new Date(); today0.setHours(0,0,0,0);
      const [fPr,setFPr]=useState("");
      var filtT=fPr?tickets.filter(function(t){return t.prestataire_id===parseInt(fPr);}):tickets;

      function diffDays(d){
        if(!d)return null;
        // Supabase peut retourner "2025-12-04T00:00:00" ou "2025-12-04"
        var s=String(d).slice(0,10); // garder seulement YYYY-MM-DD
        var dt=new Date(s+"T00:00:00");
        if(isNaN(dt))return null;
        return Math.round((today0-dt)/86400000);
      }

      function computeAv(t,overrides){
        var m=Object.assign({},t,overrides||{});
        if(isClos(m))return 100;
        var base=m.avancement;
        if(m.date_intervention_prevue&&base<60)base=60;
        if(m.engagement_prestataire&&base<40)base=40;
        if((m.derniere_relance||m.date_creation)&&base<20)base=20;
        return base;
      }

      function sendRelanceAndUpdate(t,ev){
        ev.stopPropagation();
        var p=presta.find(function(x){return x.id===t.prestataire_id;});
        var emails=presta.filter(function(x){return x.email;}).map(function(x){return x.email;}).join(";");
        var ecStr=t.echeance?new Date(t.echeance+"T00:00:00").toLocaleDateString("fr-FR"):"non définie";
        var engStr=t.engagement_prestataire?new Date(t.engagement_prestataire+"T00:00:00").toLocaleDateString("fr-FR"):"";
        var subj=encodeURIComponent("Place de Seine — Relance #"+t.id+" — "+t.description);
        var body=encodeURIComponent("Bonjour"+(p?" "+p.contact:"")+",\n\nNous revenons vers vous concernant le point suivant :\n\nTicket #"+t.id+" — "+t.description+"\nType : "+t.type+" | Priorité : "+t.priorite+"\nÉchéance : "+ecStr+(engStr?" | Votre engagement : "+engStr:"")+"\nStatut actuel : "+t.statut+" ("+t.avancement+"%)\n\nMerci de confirmer :\n• L'avancement actuel\n• La date d'intervention prévue\n• Tout point bloquant\n\nBien cordialement,\nArnaud AVONDE\n+33 (7) 85 42 37 24 — a.avonde@allianceautomotive.fr");
        window.open("mailto:"+emails+"?subject="+subj+"&body="+body,"_blank");
        var today=new Date().toISOString().slice(0,10);
        var newAv=computeAv(Object.assign({},t,{derniere_relance:today,avancement:Math.max(t.avancement,20)}));
        onUpdate(t.id,{derniere_relance:today,avancement:newAv});
      }

      function setEngagement(t,date,ev){
        ev.stopPropagation();
        var newAv=computeAv(Object.assign({},t,{engagement_prestataire:date,avancement:Math.max(t.avancement,40)}));
        onUpdate(t.id,{engagement_prestataire:date,avancement:newAv});
      }

      function setDateIntervention(t,date,ev){
        ev.stopPropagation();
        var newAv=computeAv(Object.assign({},t,{date_intervention_prevue:date,avancement:Math.max(t.avancement,60)}));
        onUpdate(t.id,{date_intervention_prevue:date,avancement:newAv});
      }

      var enRetard=filtT.filter(function(t){return !isClos(t)&&t.echeance&&new Date(t.echeance+"T00:00:00")<today0;});
      var relDep=filtT.filter(function(t){return !isClos(t)&&isRelanceDepassee(t);});
      var sansRep=filtT.filter(function(t){return !isClos(t)&&!(t.date_intervention_prevue||"").trim();});
      var sansEng=filtT.filter(function(t){return !isClos(t)&&!(t.engagement_prestataire||"").trim();});
      var echProche=filtT.filter(function(t){if(isClos(t)||!t.echeance)return false;var d=Math.round((new Date(t.echeance+"T00:00:00")-today0)/86400000);return d>=0&&d<=7;});
      var sansRel=filtT.filter(function(t){return !isClos(t)&&diffDays(t.derniere_relance||t.date_creation)>14;});

      var SECS=[
        {key:"rd",items:relDep,label:"Relance J+7 dépassée",color:"#DC2626",
          desc:function(t){var r=relanceJ7(t);return r?"Due le "+fmt(r)+" · "+Math.round((new Date()-new Date(r+"T00:00:00"))/86400000)+"j de retard":"—";}},
        {key:"re",items:enRetard,label:"Échéance dépassée",color:"#EF4444",
          desc:function(t){return "Dépassée de "+Math.abs(Math.round((new Date(t.echeance+"T00:00:00")-today0)/86400000))+"j · "+t.statut;}},
        {key:"sr",items:sansRep,label:"Sans date de réalisation",color:"#8B5CF6",
          desc:function(t){return "Dernière action il y a "+diffDays(t.derniere_relance||t.date_creation)+"j";}},
        {key:"se",items:sansEng,label:"Pas de date d'engagement donn\u00e9e",color:"#F97316",
          desc:function(t){return "Aucun engagement prestataire \u00b7 "+t.statut;}},
        {key:"ep",items:echProche,label:"Échéance cette semaine",color:"#0891B2",
          desc:function(t){var d=Math.round((new Date(t.echeance+"T00:00:00")-today0)/86400000);return "Dans "+d+"j — "+fmt(t.echeance);}},
        {key:"sl",items:sansRel,label:"Sans relance +14j",color:"#F59E0B",
          desc:function(t){return "Dernière action il y a "+diffDays(t.derniere_relance||t.date_creation)+"j";}},
      ];

      var PRIO_DOT={"Haute":"#DC2626","Moyenne":"#F59E0B","Basse":"#16A34A"};
      var avBgFn=function(v){return v>=80?"#059669":v>=60?"#7C3AED":v>=40?"#B45309":v>=20?"#2563EB":"#9CA3AF";};

      return React.createElement("div",null,

        // ── FILTRE ───────────────────────────────────────────────────────────
        React.createElement("div",{style:{marginBottom:14}},
          React.createElement("select",{value:fPr,onChange:function(ev){setFPr(ev.target.value);},style:{padding:"7px 12px",borderRadius:8,border:"1px solid var(--border)",fontSize:13,background:"var(--surface)"}},
            React.createElement("option",{value:""},"Tous les prestataires"),
            presta.map(function(p){return React.createElement("option",{key:p.id,value:p.id},p.nom);})
          )
        ),

        // ── KPI CARDS avec barre top colorée ─────────────────────────────────
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:18}},
          SECS.map(function(sec){
            return React.createElement("div",{key:sec.key,style:{background:"var(--surface)",borderRadius:10,border:"1px solid var(--border)",overflow:"hidden"}},
              React.createElement("div",{style:{height:3,background:sec.color}}),
              React.createElement("div",{style:{padding:"11px 14px"}},
                React.createElement("div",{style:{fontSize:24,fontWeight:500,color:sec.color,lineHeight:1}},sec.items.length),
                React.createElement("div",{style:{fontSize:10,fontWeight:500,color:"var(--text3)",marginTop:5,textTransform:"uppercase",letterSpacing:"0.07em",lineHeight:1.3}},sec.label)
              )
            );
          })
        ),

        // ── SECTIONS ─────────────────────────────────────────────────────────
        SECS.map(function(sec){

          // Section vide — ligne discrète
          if(sec.items.length===0){
            return React.createElement("div",{key:sec.key,style:{
              background:"var(--surface)",borderRadius:10,
              border:"1px solid var(--border)",
              padding:"9px 16px",marginBottom:8,
              display:"flex",alignItems:"center",gap:8
            }},
              React.createElement("div",{style:{width:6,height:6,borderRadius:"50%",background:"var(--border2)",flexShrink:0}}),
              React.createElement("span",{style:{fontSize:12,color:"var(--text3)"}},"✓ "+sec.label+" — Rien à signaler")
            );
          }

          return React.createElement("div",{key:sec.key,style:{
            background:"var(--surface)",borderRadius:10,
            border:"1px solid var(--border)",
            marginBottom:10,overflow:"hidden"
          }},
            // En-tête section
            React.createElement("div",{style:{
              padding:"10px 18px",borderBottom:"1px solid var(--border)",
              display:"flex",alignItems:"center",gap:10,
              background:"var(--surface2)"
            }},
              React.createElement("div",{style:{width:7,height:7,borderRadius:"50%",background:sec.color,flexShrink:0}}),
              React.createElement("span",{style:{fontWeight:500,fontSize:13,flex:1}},sec.label),
              React.createElement("span",{style:{
                background:sec.color+"20",color:sec.color,
                fontSize:11,fontWeight:500,padding:"2px 9px",borderRadius:999
              }},sec.items.length)
            ),

            // Lignes de tickets
            sec.items.map(function(t,i){
              var p=presta.find(function(x){return x.id===t.prestataire_id;});
              var avColor=avBgFn(t.avancement);
              var hasEng=t.engagement_prestataire&&t.engagement_prestataire!=="";
              var hasInt=t.date_intervention_prevue&&t.date_intervention_prevue!=="";

              return React.createElement("div",{key:t.id,style:{
                borderBottom:i<sec.items.length-1?"1px solid var(--border)":"none",
                padding:"12px 18px"
              }},
                React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,cursor:"pointer"},
                  onClick:function(){onSelectTicket(t);}},

                  // Gauche — infos ticket
                  React.createElement("div",{style:{flex:1,minWidth:0}},
                    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
                      React.createElement("span",{style:{fontSize:11,fontWeight:500,color:"var(--text3)"}},"#"+t.id),
                      React.createElement("div",{style:{width:5,height:5,borderRadius:"50%",background:PRIO_DOT[t.priorite]||"var(--border2)",flexShrink:0}}),
                      React.createElement("span",{style:{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.description),
                      React.createElement(SBadge,{s:t.statut})
                    ),
                    React.createElement("div",{style:{fontSize:11,color:"var(--text3)",marginBottom:8}},
                      sec.desc(t)+(p?" · "+p.nom:"")
                    ),
                    // Barre avancement inline
                    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
                      React.createElement("div",{style:{flex:1,maxWidth:200,background:"var(--surface2)",borderRadius:999,height:4,overflow:"hidden"}},
                        React.createElement("div",{style:{height:4,borderRadius:999,background:avColor,width:t.avancement+"%",transition:"width 0.4s"}})
                      ),
                      React.createElement("span",{style:{fontSize:10,fontWeight:500,color:avColor,minWidth:28}},t.avancement+"%")
                    )
                  ),

                  // Droite — actions rapides
                  React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end",flexShrink:0}},

                    // Engagement
                    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6}},
                      React.createElement("span",{style:{fontSize:10,color:"var(--text3)",whiteSpace:"nowrap"}},"Engagement"),
                      React.createElement("div",{style:{
                        display:"flex",alignItems:"center",gap:5,
                        background:hasEng?"var(--surface2)":"var(--surface2)",
                        border:"1px solid var(--border)",
                        borderRadius:7,padding:"3px 8px",fontSize:11,
                        color:hasEng?"var(--text)":"var(--text3)"
                      }},
                        React.createElement("i",{className:"ti ti-calendar","aria-hidden":"true",style:{fontSize:11}}),
                        React.createElement("input",{type:"date",value:t.engagement_prestataire||"",
                          onClick:function(ev){ev.stopPropagation();},
                          onChange:function(ev){setEngagement(t,ev.target.value,ev);},
                          style:{border:"none",background:"transparent",fontSize:11,outline:"none",cursor:"pointer",minWidth:hasEng?80:60,color:"inherit"}})
                      )
                    ),

                    // Intervention
                    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6}},
                      React.createElement("span",{style:{fontSize:10,color:"var(--text3)",whiteSpace:"nowrap"}},"Intervention"),
                      React.createElement("div",{style:{
                        display:"flex",alignItems:"center",gap:5,
                        background:hasInt?"#F5F3FF":"var(--surface2)",
                        border:hasInt?"0.5px solid #DDD6FE":"1px solid var(--border)",
                        borderRadius:7,padding:"3px 8px",fontSize:11,
                        color:hasInt?"#6D28D9":"var(--text3)"
                      }},
                        React.createElement("i",{className:"ti ti-tool","aria-hidden":"true",style:{fontSize:11}}),
                        React.createElement("input",{type:"date",value:t.date_intervention_prevue||"",
                          onClick:function(ev){ev.stopPropagation();},
                          onChange:function(ev){setDateIntervention(t,ev.target.value,ev);},
                          style:{border:"none",background:"transparent",fontSize:11,outline:"none",cursor:"pointer",minWidth:hasInt?80:60,color:"inherit"}})
                      )
                    ),

                    // Bouton relancer
                    React.createElement("button",{
                      onClick:function(ev){sendRelanceAndUpdate(t,ev);},
                      style:{
                        background:"var(--text)",color:"var(--surface)",
                        border:"none",borderRadius:7,padding:"6px 14px",
                        fontSize:11,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"
                      }
                    },"Relancer")
                  )
                )
              );
            })
          );
        })
      );
    }

    // ─── RENDU ───
    try {
      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    } catch(e) {
      document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace"><h2 style="color:red">Erreur</h2><pre>'+e.message+'</pre></div>';
    }
  

</script>
</body>
</html>
