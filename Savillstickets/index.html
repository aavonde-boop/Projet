<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketingDesk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F8FA;--surface:#fff;--surface2:#F1F3F8;
  --border:#E4E7EF;--border2:#CDD1E0;
  --text:#1E2A3B;--text2:#3D4D63;--subtle:#637081;--muted:#9AA5B4;
  --brand:#2563EB;--brand-dk:#1D4ED8;--brand-dim:#EFF6FF;--brand-mid:#BFDBFE;
  --green:#059669;--green-dim:#ECFDF5;--green-mid:#A7F3D0;
  --amber:#D97706;--amber-dim:#FFFBEB;--amber-mid:#FDE68A;
  --red:#DC2626;--red-dim:#FEF2F2;--red-mid:#FECACA;
  --violet:#7C3AED;--violet-dim:#EDE9FE;--violet-mid:#C4B5FD;
  --r:8px;--rlg:12px;
  --sans:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --sh0:0 1px 2px rgba(0,0,0,.05);--sh1:0 2px 8px rgba(0,0,0,.07);--sh2:0 8px 24px rgba(0,0,0,.1);
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
#scrollProg{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--brand),var(--violet));z-index:999;transition:width .1s;width:0}
/* HEADER */
header{display:flex;align-items:center;gap:10px;padding:0 24px;height:52px;background:#1a2e5a;border-bottom:1px solid #0f1e3d;position:sticky;top:0;z-index:100;box-shadow:var(--sh0);transition:box-shadow .2s}
header.scrolled{box-shadow:0 2px 16px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:27px;height:27px;border-radius:7px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(37,99,235,.3)}
.logo-text{font-family:var(--mono);font-size:13px;font-weight:500}
.logo-text .lt{color:var(--brand)}.logo-text .ld{color:var(--text)}
.hsp{flex:1}
.hdiv{width:1px;height:22px;background:rgba(255,255,255,.2)}
.btn-outline{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.2)}.btn-outline:hover{border-color:rgba(201,185,126,.8);color:#c9b97e;background:rgba(201,185,126,.1)}
.btn{border:none;border-radius:var(--r);padding:7px 14px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-brand{background:var(--brand);color:#fff;box-shadow:0 1px 4px rgba(37,99,235,.25)}.btn-brand:hover{background:var(--brand-dk)}
.btn-outline{background:var(--surface);color:var(--text2);border:1.5px solid var(--border2)}.btn-outline:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-dim)}
.btn-red{background:var(--surface);color:var(--red);border:1.5px solid var(--red-mid)}.btn-red:hover{background:var(--red-dim)}
.btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
/* SYNC BADGE */
#syncBadge{font-family:var(--mono);font-size:10.5px;padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);display:none;align-items:center;gap:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sb-pulse{animation:pulse 1.2s infinite}
/* MAIN */
main{padding:22px 28px}
/* STATS */
.stats{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh0);margin-bottom:16px}
.stat{flex:1;padding:14px 18px;display:flex;align-items:center;gap:12px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.sico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slbl{font-size:10.5px;font-weight:600;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.sval{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1}
.stat-sparkline{flex:1.5;padding:8px 14px;display:flex;align-items:center;justify-content:center}
.st-amb .sval{color:var(--amber)}.st-amb .sico{background:var(--amber-dim)}
.st-grn .sval{color:var(--green)}.st-grn .sico{background:var(--green-dim)}
.st-red .sval{color:var(--red)}.st-red .sico{background:var(--red-dim)}
/* PROGRESS */
#progressBar{margin-bottom:16px}
.prog-label{font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.prog-track{height:6px;background:var(--surface2);border-radius:3px;border:1px solid var(--border);overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--green));border-radius:3px;transition:width .5s ease;width:0}
/* FILTERS */
.filter-zone{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:10px 14px;margin-bottom:14px}
.filter-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.filter-lbl{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.qchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.qchip{border:1.5px solid var(--border);background:var(--surface2);border-radius:18px;padding:3px 11px;font-size:11px;font-weight:600;color:var(--subtle);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.qchip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-dim)}
.qchip.active{border-color:var(--brand);color:var(--brand);background:var(--brand-dim)}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.srch{display:flex;align-items:center;gap:7px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:7px 12px;flex:1;min-width:180px;transition:all .15s}
.srch:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}
.srch input{background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:13px;width:100%}
.srch input::placeholder{color:var(--muted)}
select{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:var(--sans);font-size:13px;padding:7px 12px;outline:none;cursor:pointer;transition:all .15s}
select:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}
#clearFilters{display:none;border:none;background:none;color:var(--red);font-size:11.5px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:var(--r);font-family:var(--sans)}
#clearFilters:hover{background:var(--red-dim)}
#filterCount{display:none;font-family:var(--mono);font-size:10.5px;font-weight:700;background:var(--brand);color:#fff;padding:2px 8px;border-radius:12px}
/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh1)}
table{width:100%;border-collapse:collapse}
thead{background:linear-gradient(180deg,#F8FAFF 0%,var(--surface2) 100%)}
th{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--subtle);text-align:left;padding:11px 13px;white-space:nowrap;border-bottom:2px solid var(--border2)}
th.th-dates{background:linear-gradient(180deg,#EEF6FF,#E5EFFF);color:var(--brand);border-left:2px solid var(--brand-mid)}
td{padding:12px 13px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text2);transition:background .1s}
tbody tr:last-child td{border-bottom:none}
tbody tr:nth-child(even) td{background:rgba(241,243,248,.4)}
tbody tr:hover td{background:#EEF3FF!important}
tbody tr.row-done td:first-child{border-left:3px solid var(--green)}
tbody tr.row-prog td:first-child{border-left:3px solid var(--amber)}
tbody tr.row-overdue td{background:#FEF9F9!important}
/* ROW CONTENT */
.row-num{font-family:var(--mono);font-size:9.5px;color:var(--muted);opacity:.4;margin-right:4px;font-variant-numeric:tabular-nums}
.tt{font-weight:600;color:var(--text);font-size:13px;cursor:text}
.tt:hover{color:var(--brand)}
.ts{font-size:11.5px;color:var(--subtle);margin-top:2px;cursor:text}
.ta{display:flex;gap:4px;opacity:0;transition:opacity .15s;margin-top:6px;flex-wrap:wrap}
tbody tr:hover .ta{opacity:1}
/* ACTIONS */
.ia{border:none;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .12s;line-height:1;background:var(--surface2);color:var(--subtle);font-family:var(--sans)}
.ia:hover{background:var(--brand-dim);color:var(--brand)}
.ia-del:hover{background:var(--red-dim);color:var(--red)}
/* PILLS */
.person-pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11.5px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s}
.person-pill:hover{background:var(--border);border-color:var(--border2)}
.company-pill{display:inline-flex;align-items:center;gap:5px;background:#EEF3FF;border:1px solid #C7D6FA;border-radius:20px;padding:2px 9px;font-size:11.5px;font-weight:500;color:#3B5BDB;cursor:pointer;transition:all .12s}
.company-pill:hover{background:#D8E4FD}
/* CRITICITE BARRES */
.crit-bars{display:inline-flex;align-items:flex-end;gap:2px;cursor:pointer;padding:2px}
.crit-bar{width:5px;border-radius:2px 2px 0 0;transition:all .15s}
/* FILTRES COLONNES */
.col-flt{position:relative;display:inline-block}
.col-fmenu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh2);z-index:200;min-width:160px;padding:4px;max-height:220px;overflow-y:auto}
.col-fmenu.open{display:block}
.col-fopt{display:flex;align-items:center;gap:7px;padding:6px 9px;font-size:12px;font-weight:500;border-radius:5px;cursor:pointer;color:var(--text2);transition:background .1s;white-space:nowrap;user-select:none}
.col-fopt:hover{background:var(--surface2)}
.col-fopt input[type=checkbox]{accent-color:var(--brand);width:13px;height:13px;cursor:pointer;flex-shrink:0}
.col-fcount{display:none;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:var(--brand);color:#fff;font-size:9px;font-weight:700;padding:0 4px}
.col-fcount.vis{display:inline-flex}

/* EDCELL */
.edcell{cursor:text;border-radius:4px;padding:1px 3px;margin:-1px -3px;transition:background .1s}
.edcell:hover{background:var(--brand-dim);outline:1px dashed var(--brand-mid)}
.iput{border:1.5px solid var(--brand)!important;border-radius:5px!important;background:var(--surface)!important;color:var(--text)!important;font-family:var(--sans)!important;font-size:13px!important;padding:3px 7px!important;outline:none!important;box-shadow:0 0 0 3px var(--brand-dim)!important;width:100%!important}
.iput-date{font-family:var(--mono)!important;font-size:12px!important}
.itxt{min-height:52px!important;resize:vertical!important}
/* STATUS SELECT */
.status-sel{border-radius:20px!important;font-size:11.5px!important;padding:3px 12px!important;font-weight:700!important;cursor:pointer!important;outline:none!important;-webkit-appearance:none!important;appearance:none!important;min-width:100px!important;font-family:var(--sans)!important;border-width:1.5px!important}
/* RELANCES */
.rl{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text2);padding:2px 0;position:relative}
.rl-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rl-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--amber-dim);color:var(--amber);font-size:10px;font-weight:700;border:1px solid var(--amber-mid);flex-shrink:0}
/* TOOLTIP RICH */
.rtip{position:relative}
.rtip-box{display:none;position:absolute;top:calc(100% + 8px);left:0;background:var(--text);color:#fff;font-size:12px;border-radius:var(--r);padding:10px 14px;white-space:nowrap;z-index:80;box-shadow:var(--sh2);min-width:200px;pointer-events:none;line-height:1.6;animation:fadeInTip .15s ease}
@keyframes fadeInTip{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.rtip:hover .rtip-box{display:block}
.rtip-box::before{content:'';position:absolute;bottom:100%;left:14px;border:5px solid transparent;border-bottom-color:var(--text)}
.rtip-row{display:flex;gap:8px;font-size:11px;opacity:.85;margin-top:2px}
.rtip-lbl{opacity:.6;min-width:80px}
/* DATE CELL */
.date-val{font-family:var(--mono);font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;cursor:pointer;border-radius:4px;padding:1px 3px}
.date-val:hover{background:var(--brand-dim)}
/* PAGINATION */
.pg-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface2);border-radius:0 0 var(--rlg) var(--rlg)}
.pg-info{font-family:var(--mono);font-size:11px;color:var(--muted)}
.pg-controls{display:flex;align-items:center;gap:6px}
.pg-btn{border:1.5px solid var(--border);background:var(--surface);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .1s;font-family:var(--sans)}
.pg-btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand);background:var(--brand-dim)}
.pg-btn:disabled{opacity:.3;cursor:default}
.pg-btn.act{background:var(--brand);color:#fff;border-color:var(--brand)}
/* EMPTY */
.empty{text-align:center;padding:52px 20px}
.empty svg{opacity:.2;display:block;margin:0 auto 12px}
.empty p{font-size:13px;color:var(--subtle);margin-bottom:16px}
/* COUNTER */
#tbl-count{font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 14px;text-align:right}
/* PENDING BANNER */
.pb{background:var(--amber-dim);border:1px solid var(--amber-mid);border-radius:var(--rlg);padding:12px 16px;margin-bottom:18px}
.pb-ttl{font-weight:700;font-size:12.5px;color:var(--amber);margin-bottom:9px}
.pb-it{display:flex;gap:8px;padding:7px 11px;background:rgba(255,255,255,.7);border:1px solid var(--amber-mid);border-radius:var(--r);margin-bottom:5px;font-size:12px}
.pb-it:last-child{margin-bottom:0}
/* SKEL */
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;display:inline-block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* FLASH */
@keyframes flashGreen{0%,100%{background:transparent}50%{background:var(--green-dim)}}
@keyframes flashAmber{0%,100%{background:transparent}50%{background:var(--amber-dim)}}
.flash-green td{animation:flashGreen .5s ease}
.flash-amber td{animation:flashAmber .5s ease}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(30,42,59,.4);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center}
.mov.open{display:flex}
.mo{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);width:460px;max-width:95vw;padding:24px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mo h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10.5px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 11px;outline:none;transition:all .12s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px var(--brand-dim)}
.fg textarea{resize:vertical;min-height:65px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mft{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.mfr{display:flex;gap:7px}
/* INDICATORS */
#saveInd{position:fixed;bottom:20px;left:20px;background:var(--surface);border:1px solid var(--border);color:var(--subtle);font-size:11px;font-family:var(--mono);padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:400;box-shadow:var(--sh1)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:10px;transform:translateY(60px);opacity:0;transition:all .28s;z-index:600;box-shadow:var(--sh2);display:flex;align-items:center;gap:7px}
/* DARK MODE */
body.dark{--bg:#0F1117;--surface:#1A1D2E;--surface2:#232740;--border:#2E3350;--border2:#3D4470;--text:#E8EAFF;--text2:#A8AECC;--subtle:#6B72A0;--muted:#4A5080}
body.dark tbody tr:hover td{background:#1E2235!important}
/* FULLSCREEN */
body.fullscreen header{display:none}
body.fullscreen .stats,body.fullscreen #progressBar{display:none}
/* RESPONSIVE */
@media(max-width:768px){
  header{padding:0 12px;gap:8px}
  .logo-text{display:none}
  .hdiv{display:none}
  main{padding:12px}
  .stats{overflow-x:auto;scrollbar-width:none}
  .stats::-webkit-scrollbar{display:none}
  .stat{min-width:120px;flex-shrink:0;padding:10px 14px}
  .qchips{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .qchips::-webkit-scrollbar{display:none}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:700px}
  .ta{opacity:1!important}
  .mo{width:95vw;padding:16px}
  .fr{grid-template-columns:1fr}
  #toast{right:12px;left:12px;justify-content:center}
  .pg-bar{flex-direction:column;gap:8px}
}
@media(max-width:480px){
  .stat{min-width:100px;padding:8px 12px}
  .sval{font-size:18px}
  th{font-size:9px;padding:8px}
  td{padding:8px}
}
@media print{header,.btn,.filter-zone,.stats,#toast,#saveInd,.pb{display:none!important}body{background:#fff}}
</style>
</head>
<body>

  <div style="text-align:center;width:380px;max-width:90vw">
    <!-- Logo AAG -->
    <div style="margin-bottom:32px">
      <svg viewBox="0 0 420 130" width="100%" style="max-width:380px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="6" x2="10" y2="124" stroke="#c9b97e" stroke-width="2.5" opacity=".6"/>

        <text x="210" y="44" text-anchor="middle" font-family="Georgia,serif" font-size="24" letter-spacing="22" fill="#c9b97e">ALLIANCE</text>
        <text x="210" y="76" text-anchor="middle" font-family="Georgia,serif" font-size="24" letter-spacing="3" fill="#c9b97e">AUTOMOTIVE GROUP</text>
        <line x1="130" y1="88" x2="290" y2="88" stroke="#c9b97e" stroke-width="1"/>
        <text x="210" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" letter-spacing="3" fill="#c9b97e" opacity=".8">A  GPC  COMPANY</text>
      </svg>
    </div>
    <!-- Formulaire -->
    <div style="background:rgba(255,255,255,.07);border:1px solid rgba(201,185,126,.25);border-radius:12px;padding:28px 32px;backdrop-filter:blur(8px)">
      <div style="font-size:12px;color:rgba(201,185,126,.7);margin-bottom:18px;letter-spacing:2px;text-transform:uppercase;font-family:Arial,sans-serif">Accès sécurisé</div>
      <input id="loginInput" type="password" placeholder="Code d'accès"

<script>
// ── ACCÈS ──
const CODE='AdminAAG';

}
setTimeout(()=>document.getElementById('loginInput')?.focus(),200);

// ── SUPABASE (fetch natif) ──
const SB_URL='https://yvlcmdcnjeoiffrlawti.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bGNtZGNuamVvaWZmcmxhd3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODYwNjEsImV4cCI6MjA5MTg2MjA2MX0.-ePViMbJVA0UhC4WY3fYciUcw0gP6yJWau_P1AspdlI';
const SBH={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const sb={
  async sel(t){const r=await fetch(SB_URL+'/rest/v1/'+t+'?order=id',{headers:SBH});if(!r.ok)throw new Error(await r.text());return r.json();},
  async ins(t,row){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:SBH,body:JSON.stringify(row)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async upd(t,row,id){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...SBH,'Prefer':'return=minimal'},body:JSON.stringify(row)});if(!r.ok)throw new Error(await r.text());},
  async del(t,id){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:SBH});if(!r.ok)throw new Error(await r.text());}
};

// ── MAPPING ──
function dbToTicket(r){
  let meta={};
  try{const raw=r.commentaires||'';if(raw.startsWith('__BD_META__'))meta=JSON.parse(raw.slice(11));}catch(e){}
  const rlDates=[r.date_relance1,r.date_relance2,r.date_relance3].filter(Boolean);
  let relances=meta.relances&&meta.relances.length?meta.relances:rlDates.map(d=>({date:d,comment:''}));
  relances=relances.filter(r=>r&&r.date).sort((a,b)=>a.date.localeCompare(b.date));
  const lastRelance=relances.length?[...relances].sort((a,b)=>b.date.localeCompare(a.date))[0].date:'';
  return{_dbId:r.id,title:r.description||'(sans titre)',desc:meta.desc||'',
    status:(r.statut==='Clos'||r.statut==='Escaladé')?'résolu':'en-cours',
    date:r.date_creation||'',lastRelance,relances,
    intervenant:meta.intervenant||'',soustraitant:meta.soustraitant||'',
    criticite:meta.criticite||3,engagement:r.date_realisation||meta.engagement||'',
    resolution:meta.resolution||(r.statut==='Clos'?r.date_realisation:'')||''};
}
function ticketToDb(t){
  const rl=t.relances||[];
  const meta={desc:t.desc||'',intervenant:t.intervenant||'',soustraitant:t.soustraitant||'',
    criticite:t.criticite||3,engagement:t.engagement||'',resolution:t.resolution||'',relances:rl};
  return{description:t.title||'',statut:t.status==='résolu'?'Clos':'Ouvert',
    date_creation:t.date||null,date_relance1:rl[0]?.date||null,date_relance2:rl[1]?.date||null,
    date_relance3:rl[2]?.date||null,date_realisation:t.engagement||null,
    commentaires:'__BD_META__'+JSON.stringify(meta),photos:'[]',escalade:false};
}

// ── DATA ──
const LS='tdv5';
const DEFAULTS=[
  {title:'Ascenseur A en panne',desc:'Ne répond plus depuis ce matin.',status:'en-cours',date:'2026-06-20',intervenant:'Tech. Otis',soustraitant:'Otis Elevator Co.',criticite:4,engagement:'2026-06-28',resolution:'',relances:[{date:'2026-06-22',comment:'Pièce commandée.'},{date:'2026-06-25',comment:'Livraison retardée.'}]},
  {title:'Prise grillée salle 204',desc:'Impossible de brancher.',status:'en-cours',date:'2026-06-21',intervenant:'Élec. Marin',soustraitant:'Elec Pro SARL',criticite:2,engagement:'2026-06-30',resolution:'',relances:[{date:'2026-06-23',comment:'Devis reçu.'}]},
  {title:'Fuite évier kitchenette 3F',desc:'Écoulement lent.',status:'en-cours',date:'2026-06-22',intervenant:'Plombier Leclerc',soustraitant:'',criticite:3,engagement:'',resolution:'',relances:[]},
  {title:'Badge porte nord',desc:'3 collaborateurs bloqués.',status:'résolu',date:'2026-06-19',intervenant:'Protect+',soustraitant:'',criticite:5,engagement:'2026-06-20',resolution:'2026-06-20',relances:[{date:'2026-06-19',comment:'Résolu en urgence.'}]},
  {title:'Ampoule couloir B',desc:'',status:'en-cours',date:'2026-06-24',intervenant:'',soustraitant:'',criticite:1,engagement:'',resolution:'',relances:[]},
];

function loadLocal(){
  try{const r=JSON.parse(localStorage.getItem(LS)||'{}');
    return{tickets:r.tickets&&r.tickets.length?r.tickets:DEFAULTS};
  }catch(e){return{tickets:DEFAULTS};}
}
const _d=loadLocal();
let tickets=[..._d.tickets];
let editIdx=null,relTgt=null;
let sCol='date',sDir='desc';
let pgPage=0,pgSize=9999;
let activeQFilter=null;

function saveLocal(){
  try{localStorage.setItem(LS,JSON.stringify({tickets,t:Date.now()}));}catch(e){}
  const el=document.getElementById('saveInd');
  if(!el)return;
  el.style.opacity='1';el.style.transform='translateY(0)';
  clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(10px)';},1800);
}
function today(){return new Date().toISOString().split('T')[0];}
function fmt(d){if(!d||d==='—')return'—';try{const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}catch(e){return d;}}
function isLate(t){return t.status!=='résolu'&&t.resolution&&new Date(t.resolution)<new Date();}
function isEngLate(t){return t.status!=='résolu'&&t.engagement&&new Date(t.engagement)<new Date();}
function toast(msg){const el=document.getElementById('toast');if(!el)return;el.innerHTML='✓ '+msg;el.style.opacity='1';el.style.transform='translateY(0)';clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(60px)';},2500);}
function resetApp(){if(confirm('Réinitialiser toutes les données ?')){localStorage.removeItem(LS);location.reload();}}
function closeMov(id){document.getElementById(id)?.classList.remove('open');}

// ── SUPABASE SYNC ──
async function pushToSb(t,isNew){
  try{
    const row=ticketToDb(t);
    if(isNew||!t._dbId){const data=await sb.ins('tickets',row);if(data&&data[0]){t._dbId=data[0].id;saveLocal();}}
    else await sb.upd('tickets',row,t._dbId);
  }catch(e){console.error('SB push:',e.message);}
}
async function delFromSb(t){if(!t._dbId)return;try{await sb.del('tickets',t._dbId);}catch(e){console.error('SB del:',e.message);}}
async function syncFromSb(){
  setConn('sync');
  try{
    const data=await sb.sel('tickets');
    if(data&&data.length>0){tickets=data.map(dbToTicket);saveLocal();render();setConn('ok',data.length);}
    else{setConn('empty');render();}
  }catch(e){console.error('SB sync:',e.message);setConn('err');render();}
}
function setConn(state,count){
  const el=document.getElementById('syncBadge');if(!el)return;
  const dot=s=>'<span style="width:7px;height:7px;border-radius:50%;background:'+s+';display:inline-block;vertical-align:middle;margin-right:4px'+(state==='sync'?'" class="sb-pulse"':'"')+'></span>';
  const map={sync:[dot('var(--muted)')+'Sync…','var(--muted)'],ok:[dot('var(--green)')+(count||'')+' tickets','var(--green)'],err:[dot('var(--amber)')+'Mode local','var(--amber)'],empty:[dot('var(--muted)')+'Base vide','var(--muted)']};
  const[lbl,col]=map[state]||['',''];
  el.innerHTML=lbl;el.style.color=col;el.style.display='inline-flex';
  if(state==='ok'||state==='empty')setTimeout(()=>{el.style.display='none';},4000);
}

// ── TICKET AGE ──
function ticketAge(t){
  if(!t.date)return'';
  const d=Math.floor((new Date()-new Date(t.date))/86400000);
  if(d===0)return'auj.';if(d<7)return d+'j';if(d<30)return Math.floor(d/7)+'sem';
  if(d<365)return Math.floor(d/30)+'mois';return Math.floor(d/365)+'an';
}

// ── FILTER ──
function getFiltered(){
  const q=(document.getElementById('q')?.value||'').toLowerCase();
  const now=new Date();
  let rows=tickets.map((t,i)=>{
    const rl=(t.relances||[]).filter(r=>r&&r.date);
    const lastR=rl.length?[...rl].sort((a,b)=>b.date.localeCompare(a.date))[0].date:'';
    return{...t,_i:i,_rc:rl.length,lastRelance:lastR||t.lastRelance||''};
  }).filter(t=>{
    const ns=t.status==='ouvert'?'en-cours':t.status;
    if(q&&!(t.title||'').toLowerCase().includes(q)&&!(t.intervenant||'').toLowerCase().includes(q)&&!(t.soustraitant||'').toLowerCase().includes(q))return false;
    if(colF.status.size>0&&!colF.status.has(ns))return false;
    if(colF.crit.size>0&&!colF.crit.has(String(t.criticite||3)))return false;
    if(colF.inter.size>0&&!colF.inter.has(t.intervenant||''))return false;
    if(activeQFilter==='late')return t.status!=='résolu'&&((t.engagement&&new Date(t.engagement)<now)||(t.resolution&&new Date(t.resolution)<now));
    if(activeQFilter==='nointer')return!t.intervenant;
    if(activeQFilter==='norelance')return!(t.relances&&t.relances.length);
    if(activeQFilter==='week')return t.date&&(now-new Date(t.date))<7*86400000;
    return true;
  });
  const dir=sDir==='asc'?1:-1;
  rows.sort((a,b)=>{
    if(sCol==='status')return dir*((a.status==='résolu'?1:0)-(b.status==='résolu'?1:0));
    return dir*String(a[sCol]||'').localeCompare(String(b[sCol]||''),'fr',{sensitivity:'base'});
  });
  return rows;
}

function applyQF(type){
  activeQFilter=activeQFilter===type?null:type;
  document.querySelectorAll('.qchip').forEach(ch=>ch.classList.remove('active'));
  if(activeQFilter)document.querySelector('.qchip[onclick*="\''+activeQFilter+'\'"]')?.classList.add('active');
  pgPage=0;render();

}

}

// ── PAGINATION ──
function pgNav(d){const rows=getFiltered();const pages=Math.ceil(rows.length/pgSize)||1;pgPage=Math.max(0,Math.min(pages-1,pgPage+d));render();}
function pgSzChg(){pgSize=parseInt(document.getElementById('pgSize')?.value)||20;pgPage=0;render();}
function updatePagination(total,filtered){
  const bar=document.getElementById('pgBar');if(!bar)return;
  if(pgSize>=9999||filtered===0){bar.style.display='none';return;}
  bar.style.display='flex';
  const pages=Math.ceil(filtered/pgSize)||1;
  pgPage=Math.min(pgPage,pages-1);
  const from=pgPage*pgSize+1,to=Math.min((pgPage+1)*pgSize,filtered);
  const info=document.getElementById('pgInfo');
  if(info)info.textContent='Affichage '+from+'-'+to+' sur '+filtered+(filtered!==total?' ('+total+' total)':'');
  const prev=document.getElementById('pgPrev');if(prev)prev.disabled=pgPage===0;
  const next=document.getElementById('pgNext');if(next)next.disabled=pgPage>=pages-1;
  const nums=document.getElementById('pgNums');if(!nums)return;nums.innerHTML='';
  const show=[];
  for(let i=0;i<pages;i++){if(i===0||i===pages-1||Math.abs(i-pgPage)<=1)show.push(i);else if(show[show.length-1]!=='...')show.push('...');}
  show.forEach(p=>{
    if(p==='...'){const s=document.createElement('span');s.textContent='…';s.style.cssText='color:var(--muted);padding:0 4px;font-size:12px';nums.appendChild(s);}
    else{const btn=document.createElement('button');btn.className='pg-btn'+(p===pgPage?' act':'');btn.textContent=p+1;btn.onclick=()=>{pgPage=p;render();};nums.appendChild(btn);}
  });
}

  if(!rows.length){body.innerHTML='';empty.style.display='block';return;}

// ── INLINE EDIT ──
function ed(el,i,field,multi=false){
  if(el.querySelector('input,textarea'))return;
  const inp=document.createElement(multi?'textarea':'input');
  inp.className='iput'+(multi?' itxt':'');
  inp.value=tickets[i][field]||'';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  function save(){tickets[i][field]=inp.value.trim();saveLocal();pushToSb(tickets[i],false);render();}
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(!multi&&e.key==='Enter'){e.preventDefault();inp.blur();}if(e.key==='Escape'){inp.removeEventListener('blur',save);render();}});
  inp.addEventListener('click',e=>e.stopPropagation());
}
function edDate(el,i,field){
  if(el.querySelector('input'))return;
  const inp=document.createElement('input');
  inp.type='date';inp.className='iput iput-date';inp.value=tickets[i][field]||'';
  el.innerHTML='';el.appendChild(inp);inp.focus();
  function save(){tickets[i][field]=inp.value;saveLocal();pushToSb(tickets[i],false);render();}
  inp.addEventListener('blur',save);inp.addEventListener('change',()=>inp.blur());
  inp.addEventListener('keydown',e=>{if(e.key==='Escape'){inp.removeEventListener('blur',save);render();}});
  inp.addEventListener('click',e=>e.stopPropagation());
}

function saveEdit(){
  const t=tickets[editIdx];
  t.title=document.getElementById('fTitle').value.trim()||t.title;
  t.desc=document.getElementById('fDesc').value.trim();
  t.status=document.getElementById('fStatus').value;
  t.criticite=parseInt(document.getElementById('fCrit').value)||t.criticite||3;
  t.intervenant=document.getElementById('fInter').value.trim();
  t.soustraitant=document.getElementById('fSous').value.trim();
  t.date=document.getElementById('fDate').value||t.date;
  t.engagement=document.getElementById('fEng').value;
  t.resolution=document.getElementById('fResol').value;
  saveLocal();pushToSb(t,false);closeModal();render();toast('Mis à jour ✓');
}

// ── UI HELPERS ──
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('td_dark',document.body.classList.contains('dark')?'1':'');}
function toggleFS(){document.body.classList.toggle('fullscreen');}
if(localStorage.getItem('td_dark'))document.body.classList.add('dark');
window.addEventListener('scroll',()=>{
  document.getElementById('hdr')?.classList.toggle('scrolled',window.scrollY>4);
  const prog=document.getElementById('scrollProg');
  if(prog){const h=document.body.scrollHeight-window.innerHeight;prog.style.width=(h>0?Math.min(100,window.scrollY/h*100):0)+'%';}
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='n'||e.key==='N'){e.preventDefault();openModal();}
  if(e.key==='Escape')document.querySelectorAll('.mov.open').forEach(m=>m.classList.remove('open'));
  if(e.key==='f'||e.key==='F'){e.preventDefault();toggleFS();}
  if(e.key==='d'||e.key==='D'){e.preventDefault();toggleDark();}
});
document.querySelectorAll('.mov').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ── PDF EXPORT ──
function exportAllPDF(){
  if(!window.jspdf){toast('jsPDF non chargé');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const ML=12,PW=297-ML*2;let y=ML;
  const C={brand:[37,99,235],text:[30,42,59],text2:[61,77,99],muted:[155,163,175],border:[228,234,240],bg:[248,249,252],green:[5,150,105],amber:[217,119,6],red:[220,38,38]};
  const cols=[{l:'Sujet + Description',w:72},{l:'Statut',w:20},{l:'Crit.',w:14},{l:'Intervenant / Sous-traitant',w:48},{l:'Création',w:24},{l:'Relance',w:24},{l:'Engagement',w:24},{l:'Fermeture',w:PW-72-20-14-48-24-24-24}];
  doc.setFillColor(...C.brand);doc.rect(ML,y,PW,12,'F');
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('TicketingDesk — Export tickets',ML+4,y+8);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text(fmt(today())+' · '+tickets.length+' tickets',ML+PW-2,y+8,{align:'right'});y+=16;
  function drawHdr(){
    doc.setFillColor(...C.bg);doc.setDrawColor(...C.border);doc.rect(ML,y,PW,7,'FD');
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...C.muted);
    let cx=ML;cols.forEach(c=>{doc.text(c.l.toUpperCase(),cx+2,y+4.8);cx+=c.w;});y+=7;
  }
  drawHdr();
  const rows=getFiltered();
  rows.forEach((t,ri)=>{
    doc.setFontSize(8);
    const tL=doc.splitTextToSize(t.title||'',cols[0].w-4);
    const dL=t.desc?doc.splitTextToSize(t.desc,cols[0].w-4):[];
    const iL=doc.splitTextToSize(t.intervenant||'',cols[3].w-4);
    const sL=t.soustraitant?doc.splitTextToSize(t.soustraitant,cols[3].w-4):[];
    const rh=Math.max(10,(tL.length+dL.length)*4.2+3.6,(iL.length+sL.length)*4.2+3.6,20);
    if(y+rh>198){doc.addPage();y=ML;drawHdr();}
    if(ri%2===0){doc.setFillColor(...C.bg);doc.rect(ML,y,PW,rh,'F');}
    doc.setDrawColor(...C.border);doc.setLineWidth(.2);doc.line(ML,y+rh,ML+PW,y+rh);
    const ok=t.status==='résolu';const ty=y+3.8;let cx=ML;
    cols.forEach((c,ci)=>{
      if(ci===0){
        doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);
        tL.forEach((l,li)=>doc.text(l,cx+2,ty+li*4.2));
        if(dL.length){const dy=ty+tL.length*4.2+0.5;doc.setFontSize(7.5);doc.setFont('helvetica','italic');doc.setTextColor(...C.muted);dL.forEach((l,li)=>{if(dy+li*3.8<y+rh)doc.text(l,cx+2,dy+li*3.8);});}
      } else if(ci===1){
        const bw=16,bh=5,bx=cx+(c.w-bw)/2,by=y+(rh-bh)/2;
        doc.setFillColor(...ok?[236,253,245]:[255,251,235]);doc.setDrawColor(...ok?[167,243,208]:[253,230,138]);
        doc.roundedRect(bx,by,bw,bh,1.5,1.5,'FD');
        doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...ok?C.green:C.amber);
        doc.text(ok?'Résolu':'En cours',bx+bw/2,by+3.6,{align:'center'});
      } else if(ci===2){
        const cr=t.criticite||3;const critCols=[[34,197,94],[132,204,22],[245,158,11],[249,115,22],[239,68,68]];const cc=critCols[cr-1];
        const bw=4,gap=2,bhs=[4,6,8,10,13],tw=(bw+gap)*5-gap,bx=cx+(c.w-tw)/2;
        for(let bi=1;bi<=5;bi++){const bh=bhs[bi-1];const by2=y+rh/2+6-bh;doc.setFillColor(...(bi<=cr?cc:C.border));doc.roundedRect(bx+(bi-1)*(bw+gap),by2,bw,bh,.8,.8,'F');}
        doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...critCols[cr-1]);
        doc.text(cr+'/5',cx+c.w/2,y+rh/2+9,{align:'center'});
      } else if(ci===3){
        doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...C.text2);
        if(t.intervenant){iL.forEach((l,li)=>{if(ty+li*4.2<y+rh)doc.text(l,cx+2,ty+li*4.2);});}
        if(t.soustraitant){const sy=ty+(iL.length?iL.length*4.2+1:0);doc.setFontSize(7);doc.setFont('helvetica','italic');doc.setTextColor(...C.muted);sL.forEach((l,li)=>{if(sy+li*3.8<y+rh)doc.text(l,cx+2,sy+li*3.8);});}
        if(!t.intervenant&&!t.soustraitant){doc.setTextColor(...C.muted);doc.text('—',cx+2,ty);}
      } else {
        const vals=['','','','',fmt(t.date),fmt(t.lastRelance||''),fmt(t.engagement||''),fmt(t.resolution||'')];
        const v=vals[ci]||'';
        let dcol=[...C.text2];
        if(ci===4)dcol=[...C.brand];
        else if(ci===5)dcol=[...C.muted];
        else if(ci===6)dcol=isEngLate(t)?[...C.red]:[...C.green];
        else if(ci===7)dcol=isLate(t)?[...C.red]:[...C.green];
        doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...dcol);
        if(v&&v!=='—'){const ls=doc.splitTextToSize(v,c.w-4);ls.forEach((l,li)=>{if(ty+li*4.2<y+rh)doc.text(l,cx+2,ty+li*4.2);});}
        else{doc.setTextColor(...C.muted);doc.text('—',cx+2,ty);}
      }
      cx+=c.w;
    });
    y+=rh;
  });
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(...C.muted);
  doc.text('TicketingDesk · '+fmt(today())+' · '+rows.length+' ticket'+(rows.length!==1?'s':''),ML,204);
  doc.save('TicketingDesk_export_'+today()+'.pdf');
  toast('PDF exporté ✓');
}

// ── INIT ──
render();
syncFromSb();
</script>
