<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Gestion des Badges de Prêt - LP24</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#F5F7FA;--surface:#FFFFFF;--surface2:#F0F2F5;--surface3:#E8EBF0;
      --border:#DDE1E7;--border2:#C8CDD6;
      --text:#1A1F2E;--text2:#4A5568;--text3:#718096;
      --accent:#3B82F6;--accent2:#2563EB;--accentBg:rgba(59,130,246,.1);
      --green:#16A34A;--greenBg:rgba(22,163,74,.1);
      --red:#DC2626;--redBg:rgba(220,38,38,.1);
      --orange:#EA580C;--orangeBg:rgba(234,88,12,.1);
      --purple:#9333EA;--purpleBg:rgba(147,51,234,.1);
      --yellow:#CA8A04;--yellowBg:rgba(202,138,4,.1);
      --cyan:#0891B2;--cyanBg:rgba(8,145,178,.1);
      --radius:10px;--radius-sm:6px;--radius-lg:14px;
    }
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    button,input,select,textarea{font-family:inherit;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:var(--surface2);}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
    @keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .toast-anim{animation:toastIn .25s ease forwards;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .anim-in{animation:fadeIn .3s ease forwards;}
    @media(max-width:768px){
      .tbl-desktop{display:none!important}
      .cards-mobile{display:block!important}
      main{padding:12px!important;padding-bottom:80px!important}
      .kpi-card{padding:12px 14px!important}
      .kpi-card div:first-child{font-size:22px!important}
    }
    @media(min-width:769px){.cards-mobile{display:none!important}}
    .cards-mobile{display:none;}
    .mob-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;border-left:3px solid var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.05);}
    .mob-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border);}
    .mob-row:last-child{border-bottom:none;}
    .mob-lbl{color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#2563EB;}
    .btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
    .btn-outline:hover{background:var(--surface2);border-color:var(--text3);}
    .btn-success{background:var(--greenBg);border:1px solid rgba(34,197,94,.25);color:var(--green);}
    .btn-success:hover{background:var(--green);color:#fff;}
    .btn-sm{padding:5px 10px;font-size:11px;}
    .inp{width:100%;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);font-size:14px;transition:all .2s;}
    .inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.1);}
    .lbl{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;gap:5px;}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;transition:all .2s;cursor:pointer;}
    .kpi-card:active{transform:scale(.98);}
    .kpi-card.clickable{cursor:pointer;}
    .modal-overlay{position:fixed;inset:0;background:rgba(30,40,60,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:12px 12px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;background:rgba(0,0,0,.02);border-bottom:1px solid var(--border);}
    td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;}
    tr:hover td{background:var(--accentBg);}
    .statut-disponible{color:var(--green);font-weight:700;}
    .statut-prete{color:var(--orange);font-weight:700;}
    .statut-empruntee{color:var(--red);font-weight:700;}
    .historique-entry{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--accent);}
    .nav-tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;background:transparent;color:var(--text2);}
    .nav-tab.active{background:var(--accentBg);color:var(--accent2);}
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  const { useState, useMemo, useRef, useEffect, useCallback } = React;

  // Configuration Supabase
  const SUPABASE_URL = "https://jymobewqenhcjtzniytb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bW9iZXdxZW5oY2p0em5peXRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjQ5NTEsImV4cCI6MjA5MjIwMDk1MX0.CpqOnvJ4YtsYHw6fSE7Xyj5MOXkXx-gBwT69J0F46p0";
  let sb = null;
  try { if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) { console.log("Supabase non disponible"); }

  // Badges initiaux
  const INITIAL_BADGES = [
    { id: 1, code: "P001", nom: "Badge Prêt 1", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 2, code: "P002", nom: "Badge Prêt 2", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 3, code: "P003", nom: "Badge Prêt 3", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 4, code: "P004", nom: "Badge Prêt 4", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 5, code: "P005", nom: "Badge Prêt 5", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 6, code: "P006", nom: "Badge Prêt 6", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 7, code: "P007", nom: "Badge Prêt 7", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 8, code: "P008", nom: "Badge Prêt 8", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 9, code: "P009", nom: "Badge Prêt 9", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" },
    { id: 10, code: "P010", nom: "Badge Prêt 10", statut: "disponible", emprunteur: "", date_emprunt: "", date_retour_prevu: "", commentaire: "" }
  ];

  const statutConfig = {
    disponible: { label: "Disponible", color: "#16A34A", bg: "rgba(22,163,74,.1)" },
    prete: { label: "Prêtée", color: "#EA580C", bg: "rgba(234,88,12,.1)" },
    empruntee: { label: "Empruntée", color: "#DC2626", bg: "rgba(220,38,38,.1)" }
  };

  const todayISO = () => new Date().toISOString().slice(0,10);
  const fmtDate = d => d ? new Date(d).toLocaleDateString("fr-FR") : "—";
  const fmtTime = () => new Date().toLocaleString("fr-FR", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });

  const App = () => {
    const [badges, setBadges] = useState(INITIAL_BADGES);
    const [search, setSearch] = useState("");
    const [filtreStatut, setFiltreStatut] = useState("");
    const [selectedBadge, setSelectedBadge] = useState(null);
    const [modalOpen, setModalOpen] = useState(false);
    const [toast, setToast] = useState(null);
    const [loading, setLoading] = useState(true);
    const [activeTab, setActiveTab] = useState("badges");
    const [historique, setHistorique] = useState([]);
    const toastTimer = useRef(null);

    const showToast = (msg, type = "ok") => {
      if (toastTimer.current) clearTimeout(toastTimer.current);
      setToast({ msg, type });
      toastTimer.current = setTimeout(() => setToast(null), 3000);
    };

    // Ajouter une entrée dans l'historique
    const addHistorique = useCallback((action, detail, badgeCode = "") => {
      const entry = {
        id: Date.now(),
        date: fmtTime(),
        action,
        detail,
        badge: badgeCode,
        user: "Utilisateur"
      };
      setHistorique(prev => [entry, ...prev].slice(0, 100));
      // Sauvegarde dans Supabase si disponible
      if (sb) {
        sb.from("badges_historique").insert({
          action, detail, badge_code: badgeCode, user: "Utilisateur", created_at: new Date().toISOString()
        }).catch(e => console.log("Erreur sauvegarde historique", e));
      }
    }, []);

    // Chargement depuis Supabase
    useEffect(() => {
      if (!sb) {
        setLoading(false);
        return;
      }
      Promise.all([
        sb.from("badges").select("*").order("id"),
        sb.from("badges_historique").select("*").order("id", { ascending: false }).limit(100)
      ]).then(([{ data: badgesData, error: bError }, { data: histoData, error: hError }]) => {
        if (!bError && badgesData && badgesData.length > 0) {
          setBadges(badgesData);
        }
        if (!hError && histoData) {
          setHistorique(histoData.map(h => ({ ...h, date: new Date(h.created_at).toLocaleString("fr-FR") })));
        }
        setLoading(false);
      }).catch(() => setLoading(false));
    }, []);

    // Sauvegarde auto dans Supabase
    const saveToSupabase = useCallback(async (newBadges) => {
      if (!sb) return;
      for (const badge of newBadges) {
        await sb.from("badges").upsert(badge).catch(e => console.log(e));
      }
    }, []);

    const stats = useMemo(() => ({
      total: badges.length,
      disponibles: badges.filter(b => b.statut === "disponible").length,
      pretees: badges.filter(b => b.statut === "prete").length,
      empruntees: badges.filter(b => b.statut === "empruntee").length
    }), [badges]);

    const filteredBadges = useMemo(() => {
      let result = badges;
      if (search.trim()) {
        const q = search.toLowerCase();
        result = result.filter(b => 
          b.code.toLowerCase().includes(q) || 
          b.nom.toLowerCase().includes(q) ||
          (b.emprunteur && b.emprunteur.toLowerCase().includes(q))
        );
      }
      if (filtreStatut) result = result.filter(b => b.statut === filtreStatut);
      return result;
    }, [badges, search, filtreStatut]);

    const openModal = (badge) => {
      setSelectedBadge({ ...badge });
      setModalOpen(true);
    };

    const closeModal = () => {
      setModalOpen(false);
      setSelectedBadge(null);
    };

    const updateStatus = (badgeId, newStatus, emprunteur = "", dateRetour = "") => {
      const oldBadge = badges.find(b => b.id === badgeId);
      setBadges(prev => {
        const newBadges = prev.map(b => {
          if (b.id !== badgeId) return b;
          const now = todayISO();
          return {
            ...b,
            statut: newStatus,
            emprunteur: newStatus === "disponible" ? "" : (emprunteur || b.emprunteur),
            date_emprunt: newStatus === "empruntee" ? now : (newStatus === "disponible" ? "" : b.date_emprunt),
            date_retour_prevu: newStatus === "empruntee" ? (dateRetour || "") : (newStatus === "prete" ? (dateRetour || "") : "")
          };
        });
        saveToSupabase(newBadges);
        return newBadges;
      });
      
      const actionText = statutConfig[newStatus]?.label || newStatus;
      addHistorique(
        `Changement de statut`, 
        `${oldBadge?.code} : ${statutConfig[oldBadge?.statut]?.label} → ${actionText}`,
        oldBadge?.code || ""
      );
      showToast(`Badge ${oldBadge?.code} → ${actionText}`);
      closeModal();
    };

    const updateCommentaire = (badgeId, commentaire) => {
      setBadges(prev => {
        const newBadges = prev.map(b => b.id === badgeId ? { ...b, commentaire } : b);
        saveToSupabase(newBadges);
        return newBadges;
      });
      addHistorique("Modification commentaire", `Badge ${badges.find(b=>b.id===badgeId)?.code}`, badges.find(b=>b.id===badgeId)?.code);
    };

    const getStatutClass = (statut) => {
      if (statut === "disponible") return "statut-disponible";
      if (statut === "prete") return "statut-prete";
      return "statut-empruntee";
    };

    const el = React.createElement;

    if (loading) {
      return el("div", { style: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" } },
        el("div", { style: { textAlign: "center" } },
          el("div", { style: { fontSize: 32, marginBottom: 8 } }, "🔄"),
          el("div", { style: { fontSize: 14, color: "var(--text2)" } }, "Chargement...")
        )
      );
    }

    // Version mobile (cards)
    const mobileCards = el("div", { className: "cards-mobile" },
      filteredBadges.map(badge => {
        const cfg = statutConfig[badge.statut];
        return el("div", { key: badge.id, className: "mob-card", style: { borderLeftColor: cfg.color } },
          el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 } },
            el("div", null,
              el("div", { style: { fontWeight: 800, fontSize: 16, fontFamily: "'JetBrains Mono', monospace" } }, badge.code),
              el("div", { style: { fontSize: 12, color: "var(--text2)" } }, badge.nom)
            ),
            el("span", { className: "badge", style: { background: cfg.bg, color: cfg.color } }, cfg.label)
          ),
          badge.emprunteur && el("div", { className: "mob-row" },
            el("span", { className: "mob-lbl" }, "👤 Emprunteur"),
            el("span", { style: { fontWeight: 500 } }, badge.emprunteur)
          ),
          badge.date_retour_prevu && el("div", { className: "mob-row" },
            el("span", { className: "mob-lbl" }, "📅 Retour prévu"),
            el("span", null, fmtDate(badge.date_retour_prevu))
          ),
          badge.date_emprunt && badge.statut === "empruntee" && el("div", { className: "mob-row" },
            el("span", { className: "mob-lbl" }, "📆 Emprunté le"),
            el("span", null, fmtDate(badge.date_emprunt))
          ),
          badge.commentaire && el("div", { className: "mob-row" },
            el("span", { className: "mob-lbl" }, "💬 Commentaire"),
            el("span", { style: { fontSize: 11, color: "var(--text3)" } }, badge.commentaire)
          ),
          el("div", { style: { marginTop: 12, display: "flex", gap: 8 } },
            el("button", { 
              className: "btn btn-outline btn-sm", 
              style: { flex: 1 },
              onClick: () => openModal(badge)
            }, badge.statut === "disponible" ? "🔑 Prêter / Emprunter" : "✏️ Modifier"),
            (badge.statut === "prete" || badge.statut === "empruntee") && 
              el("button", { 
                className: "btn btn-success btn-sm", 
                style: { flex: 1 },
                onClick: () => updateStatus(badge.id, "disponible")
              }, "✅ Rendre")
          )
        );
      })
    );

    // Vue badges
    const badgesView = el("div", null,
      // KPIs
      el("div", { style: { display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 20 } },
        el("div", { className: "kpi-card", style: { borderTop: "2px solid #3B82F6", textAlign: "center" } },
          el("div", { style: { fontSize: { base: 22, sm: 28 }, fontWeight: 800, color: "#3B82F6" } }, stats.total),
          el("div", { style: { fontSize: 10, color: "var(--text2)", marginTop: 4 } }, "Total")
        ),
        el("div", { className: "kpi-card clickable", style: { borderTop: "2px solid #16A34A", textAlign: "center" }, onClick: () => setFiltreStatut(filtreStatut === "disponible" ? "" : "disponible") },
          el("div", { style: { fontSize: { base: 22, sm: 28 }, fontWeight: 800, color: "#16A34A" } }, stats.disponibles),
          el("div", { style: { fontSize: 10, color: "var(--text2)", marginTop: 4 } }, "Disponibles")
        ),
        el("div", { className: "kpi-card clickable", style: { borderTop: "2px solid #EA580C", textAlign: "center" }, onClick: () => setFiltreStatut(filtreStatut === "prete" ? "" : "prete") },
          el("div", { style: { fontSize: { base: 22, sm: 28 }, fontWeight: 800, color: "#EA580C" } }, stats.pretees),
          el("div", { style: { fontSize: 10, color: "var(--text2)", marginTop: 4 } }, "Prêtées")
        ),
        el("div", { className: "kpi-card clickable", style: { borderTop: "2px solid #DC2626", textAlign: "center" }, onClick: () => setFiltreStatut(filtreStatut === "empruntee" ? "" : "empruntee") },
          el("div", { style: { fontSize: { base: 22, sm: 28 }, fontWeight: 800, color: "#DC2626" } }, stats.empruntees),
          el("div", { style: { fontSize: 10, color: "var(--text2)", marginTop: 4 } }, "Empruntées")
        )
      ),

      // Filtres
      el("div", { style: { background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "12px 14px", marginBottom: 16, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" } },
        el("input", {
          type: "text",
          value: search,
          onChange: e => setSearch(e.target.value),
          placeholder: "🔍 Rechercher...",
          className: "inp",
          style: { flex: 1, minWidth: 150 }
        }),
        (filtreStatut || search) && el("button", { 
          className: "btn btn-outline btn-sm", 
          style: { fontSize: 11, padding: "6px 12px" },
          onClick: () => { setSearch(""); setFiltreStatut(""); }
        }, "✕ Effacer"),
        el("span", { style: { fontSize: 11, color: "var(--text3)" } }, filteredBadges.length + "/" + badges.length)
      ),

      // Tableau desktop
      el("div", { className: "tbl-desktop", style: { background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", overflow: "auto" } },
        el("table", { style: { minWidth: 700 } },
          el("thead", null,
            el("tr", null,
              el("th", { style: { width: 80 } }, "Code"),
              el("th", null, "Nom"),
              el("th", { style: { width: 100 } }, "Statut"),
              el("th", { style: { width: 160 } }, "Emprunteur"),
              el("th", { style: { width: 100 } }, "Date emprunt"),
              el("th", { style: { width: 100 } }, "Retour prévu"),
              el("th", null, "Commentaire"),
              el("th", { style: { width: 110 } }, "Actions")
            )
          ),
          el("tbody", null,
            filteredBadges.map(badge => {
              const cfg = statutConfig[badge.statut];
              return el("tr", { key: badge.id },
                el("td", { style: { fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", fontSize: 12 } }, badge.code),
                el("td", null, badge.nom),
                el("td", null, el("span", { className: getStatutClass(badge.statut) }, cfg.label)),
                el("td", { style: { color: "var(--text2)" } }, badge.emprunteur || "—"),
                el("td", { style: { fontSize: 11, color: "var(--text3)" } }, fmtDate(badge.date_emprunt)),
                el("td", { style: { fontSize: 11, color: "var(--text3)" } }, fmtDate(badge.date_retour_prevu)),
                el("td", { style: { fontSize: 11, color: "var(--text3)", maxWidth: 180, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, badge.commentaire || "—"),
                el("td", null,
                  el("div", { style: { display: "flex", gap: 6 } },
                    el("button", { 
                      className: "btn btn-outline btn-sm", 
                      style: { fontSize: 11, padding: "4px 8px" },
                      onClick: () => openModal(badge)
                    }, badge.statut === "disponible" ? "🔑 Prêter" : "✏️"),
                    (badge.statut === "prete" || badge.statut === "empruntee") && 
                      el("button", { 
                        className: "btn btn-success btn-sm", 
                        style: { fontSize: 11, padding: "4px 8px" },
                        onClick: () => updateStatus(badge.id, "disponible")
                      }, "✅")
                  )
                )
              );
            })
          )
        ),
        filteredBadges.length === 0 && el("div", { style: { textAlign: "center", padding: 48, color: "var(--text3)" } }, "Aucun badge trouvé")
      ),
      mobileCards
    );

    // Vue historique
    const historiqueView = el("div", null,
      el("div", { style: { marginBottom: 16 } },
        el("h2", { style: { fontSize: 18, fontWeight: 700, marginBottom: 8 } }, "🕐 Historique des actions"),
        el("p", { style: { fontSize: 12, color: "var(--text2)" } }, "Dernières actions sur les badges")
      ),
      historique.length === 0 
        ? el("div", { style: { textAlign: "center", padding: 48, color: "var(--text3)" } }, 
            el("div", { style: { fontSize: 40, marginBottom: 8 } }, "🕐"),
            "Aucune action enregistrée"
          )
        : el("div", null,
            historique.map(h => 
              el("div", { key: h.id, className: "historique-entry" },
                el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 } },
                  el("span", { style: { fontSize: 11, fontWeight: 700, color: "var(--accent2)" } }, h.action),
                  el("span", { style: { fontSize: 10, color: "var(--text3)" } }, h.date)
                ),
                el("div", { style: { fontSize: 12, color: "var(--text)" } }, h.detail),
                h.badge && el("div", { style: { fontSize: 10, color: "var(--text3)", marginTop: 4 } }, "🏷️ " + h.badge)
              )
            )
          )
    );

    return el("div", { style: { minHeight: "100vh", background: "var(--bg)" } },
      toast && el("div", { className: "toast-anim", style: {
        position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)",
        zIndex: 9999, background: toast.type === "err" ? "#7F1D1D" : "#14532D",
        border: `1px solid ${toast.type === "err" ? "rgba(239,68,68,.3)" : "rgba(34,197,94,.3)"}`,
        color: "#fff", padding: "10px 20px", borderRadius: 12, fontSize: 13,
        fontWeight: 600, whiteSpace: "nowrap", pointerEvents: "none"
      } }, toast.msg),

      // Header
      el("div", { style: {
        background: "linear-gradient(135deg,rgba(59,130,246,.15) 0%,rgba(168,85,247,.08) 100%)",
        borderBottom: "1px solid var(--border)", padding: "16px 20px", position: "sticky", top: 0, zIndex: 100, background: "var(--surface)"
      } },
        el("div", { style: { maxWidth: 1400, margin: "0 auto" } },
          el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 } },
            el("div", null,
              el("h1", { style: { fontSize: 20, fontWeight: 800, display: "flex", alignItems: "center", gap: 8 } },
                el("span", { style: { fontSize: 24 } }, "🏷️"),
                "Badges de Prêt"
              )
            ),
            el("div", { style: { display: "flex", gap: 8 } },
              el("button", { 
                className: `nav-tab ${activeTab === "badges" ? "active" : ""}`,
                onClick: () => setActiveTab("badges")
              }, "📋 Badges"),
              el("button", { 
                className: `nav-tab ${activeTab === "historique" ? "active" : ""}`,
                onClick: () => setActiveTab("historique")
              }, "🕐 Historique")
            )
          )
        )
      ),

      // Main content
      el("main", { style: { maxWidth: 1400, margin: "0 auto", padding: 20 } },
        activeTab === "badges" ? badgesView : historiqueView
      ),

      // Modal
      modalOpen && selectedBadge && el("div", { className: "modal-overlay", onClick: e => { if (e.target === e.currentTarget) closeModal(); } },
        el("div", { className: "modal" },
          el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 } },
            el("h3", { style: { fontWeight: 800, fontSize: 18, display: "flex", alignItems: "center", gap: 8 } },
              el("span", null, "🏷️"),
              selectedBadge.code, " - ", selectedBadge.nom
            ),
            el("button", { onClick: closeModal, style: { background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "var(--text3)" } }, "×")
          ),
          el("div", { style: { marginBottom: 16 } },
            el("span", { className: "badge", style: { background: statutConfig[selectedBadge.statut]?.bg, color: statutConfig[selectedBadge.statut]?.color } },
              "Statut : ", statutConfig[selectedBadge.statut]?.label
            )
          ),
          el("div", { style: { marginBottom: 14 } },
            el("div", { className: "lbl" }, "👤 Emprunteur / réservant"),
            el("input", {
              type: "text",
              className: "inp",
              value: selectedBadge.emprunteur || "",
              onChange: e => setSelectedBadge({ ...selectedBadge, emprunteur: e.target.value }),
              placeholder: "Nom et prénom"
            })
          ),
          el("div", { style: { marginBottom: 14 } },
            el("div", { className: "lbl" }, "📅 Date de retour prévue"),
            el("input", {
              type: "date",
              className: "inp",
              value: selectedBadge.date_retour_prevu || "",
              onChange: e => setSelectedBadge({ ...selectedBadge, date_retour_prevu: e.target.value })
            })
          ),
          el("div", { style: { marginBottom: 18 } },
            el("div", { className: "lbl" }, "💬 Commentaire"),
            el("input", {
              type: "text",
              className: "inp",
              value: selectedBadge.commentaire || "",
              onChange: e => setSelectedBadge({ ...selectedBadge, commentaire: e.target.value }),
              placeholder: "Observations..."
            })
          ),
          el("div", { style: { display: "flex", gap: 10, marginBottom: 14 } },
            el("button", {
              className: "btn btn-primary",
              style: { flex: 1 },
              onClick: () => updateStatus(selectedBadge.id, "prete", selectedBadge.emprunteur, selectedBadge.date_retour_prevu)
            }, "🔑 Prêtée"),
            el("button", {
              className: "btn",
              style: { flex: 1, background: "var(--red)", color: "#fff" },
              onClick: () => updateStatus(selectedBadge.id, "empruntee", selectedBadge.emprunteur, selectedBadge.date_retour_prevu)
            }, "🔴 Empruntée")
          ),
          (selectedBadge.statut === "prete" || selectedBadge.statut === "empruntee") && el("button", {
            className: "btn btn-success",
            style: { width: "100%", justifyContent: "center" },
            onClick: () => updateStatus(selectedBadge.id, "disponible")
          }, "✅ Rendre disponible")
        )
      )
    );
  };

  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
})();
</script>
</body>
</html>
